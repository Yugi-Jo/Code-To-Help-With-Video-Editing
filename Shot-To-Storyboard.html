<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Vibe-Code: AI Storyboard Studio</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0b0f19; color: #f3f4f6; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 24px; max-width: 1400px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 32px; }
        h1 { font-size: 2rem; font-weight: 800; background: linear-gradient(to right, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
        .sub { color: #9ca3af; font-size: 0.9rem; }
        .config-box { background-color: #111827; border: 1px solid #1f2937; padding: 16px; border-radius: 12px; margin-bottom: 24px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); display: grid; grid-template-columns: 1fr; gap: 16px; }
        @media (min-width: 768px) { .config-box { grid-template-columns: 1fr 1fr; } }
        label { font-size: 11px; font-weight: 700; color: #a855f7; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 8px; }
        select, input[type="text"] { width: 100%; background-color: #030712; border: 1px solid #374151; border-radius: 6px; padding: 12px; color: #e5e7eb; font-size: 14px; font-weight: 500; outline: none; transition: border-color 0.2s; }
        select:focus, input[type="text"]:focus { border-color: #a855f7; }
        .workspace-layout { display: grid; grid-template-columns: 1fr; gap: 24px; }
        @media (min-width: 1100px) { .workspace-layout { grid-template-columns: 350px 1fr; } }
        .panel-left { background-color: #111827; border: 1px solid #1f2937; padding: 16px; border-radius: 12px; height: fit-content; }
        textarea { width: 100%; height: 280px; background-color: #030712; border: 1px solid #1f2937; border-radius: 12px; padding: 16px; color: #e5e7eb; font-size: 14px; resize: none; outline: none; margin-bottom: 16px; transition: border-color 0.2s; }
        textarea:focus { border-color: #ec4899; }
        button { width: 100%; background: linear-gradient(to right, #a855f7, #ec4899); color: white; font-weight: 700; padding: 14px; border: none; border-radius: 12px; cursor: pointer; font-size: 14px; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .copy-btn { width: auto; background: rgba(168, 85, 247, 0.15); border: 1px solid rgba(168, 85, 247, 0.4); padding: 6px 12px; border-radius: 6px; color: #c084fc; font-size: 11px; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; color: #e5e7eb; font-weight: 600; }
        #outputContainer { background-color: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 20px; min-height: 500px; color: #9ca3af; font-size: 14px; }
        .storyboard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 20px; }
        .panel-card { background-color: #030712; border: 1px solid #1f2937; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
        .aspect-16-9 { aspect-ratio: 16 / 9; position: relative; overflow: hidden; background: #000; display: flex; align-items: center; justify-content: center; padding: 8px; border-bottom: 1px solid #111827; }
        .camera-grid::before { content: ''; position: absolute; inset: 0; border-left: 1px dashed rgba(236, 72, 153, 0.1); border-right: 1px dashed rgba(236, 72, 153, 0.1); pointer-events: none; }
        .camera-grid::after { content: ''; position: absolute; inset: 0; border-top: 1px dashed rgba(236, 72, 153, 0.1); border-bottom: 1px dashed rgba(236, 72, 153, 0.1); pointer-events: none; }
        .cam-tag { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.7); padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 10px; color: #9ca3af; border: 1px solid #1f2937; }
        .time-tag { position: absolute; bottom: 8px; right: 8px; background: rgba(157, 23, 77, 0.8); padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 10px; color: #f472b6; border: 1px solid rgba(244, 114, 182, 0.3); }
        .meta-bar { padding: 12px; background: rgba(17, 24, 39, 0.4); border-bottom: 1px solid rgba(31, 41, 55, 0.6); font-family: monospace; font-size: 11px; }
        .meta-title { color: #c084fc; font-weight: 700; margin-bottom: 2px; text-transform: uppercase; }
        .meta-framing { color: #9ca3af; font-size: 11px; }
        .card-content { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .script-quote { font-size: 12px; color: #6b7280; font-style: italic; margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .task-row { display: flex; gap: 8px; background: rgba(17, 24, 39, 0.2); padding: 8px; border-radius: 6px; border: 1px solid #111827; }
        .task-check { margin-top: 3px; width: 14px; height: 14px; accent-color: #ec4899; flex-shrink: 0; }
        .task-text { color: #d1d5db; font-size: 12px; line-height: 1.5; }
        .status-msg { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 0; text-align: center; color: #a855f7; font-weight: 600; }
        .status-sub { color: #6b7280; font-size: 11px; font-weight: 400; margin-top: 4px; }
    </style>
</head>
<body>

    <header>
        <h1>🎬 Vibe-Code: AI Storyboard Studio</h1>
        <div class="sub">Free Serverless Token-Based Script Inferences</div>
    </header>

    <div class="config-box">
        <div>
            <label>🔑 Hugging Face User Access Token (Read Scope Allowed)</label>
            <input type="text" id="hfToken" placeholder="hf_xxxxxxxxxxxxxxxxxxxxxxxxxx">
        </div>
        <div>
            <label>📅 Production Tier Workflow</label>
            <select id="productionTier">
                <option value="tier1" selected>🚀 Tier 1: Speed Run (1-2 Days Max)</option>
                <option value="tier2">⏳ Tier 2: Steady Grind (3-5 Days)</option>
                <option value="tier3">🏆 Tier 3: Full Week Masterpiece</option>
            </select>
        </div>
    </div>

    <div class="workspace-layout">
        <div class="panel-left">
            <label>📜 Paste Your Script</label>
            <textarea id="scriptInput" placeholder="Paste your narrative sequence or video voiceover script directly here..."></textarea>
            <button id="generateBtn">⚡ Run Live Free-Tier Inference</button>
        </div>

        <div>
            <div class="panel-header">
                <div>📋 Multi-Panel Production Storyboard</div>
                <button class="copy-btn" id="copyMarkdownBtn">Copy Board Markdown</button>
            </div>
            <div id="outputContainer">
                Enter your read token and script data container to execute local browser rendering rules...
            </div>
        </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
    const generateBtn = document.getElementById('generateBtn');
    const copyMarkdownBtn = document.getElementById('copyMarkdownBtn');

    if(generateBtn) {
        generateBtn.disabled = false; // Force ensure button is alive on load
        generateBtn.addEventListener('click', generateStoryboardBlueprint);
    }
    if(copyMarkdownBtn) copyMarkdownBtn.addEventListener('click', copyMarkdown);
});

async function generateStoryboardBlueprint() {
    const tokenInput = document.getElementById('hfToken').value.trim();
    const scriptInput = document.getElementById('scriptInput').value.trim();
    const tierSelect = document.getElementById('productionTier').value;
    const outputEl = document.getElementById('outputContainer');
    const generateBtn = document.getElementById('generateBtn');

    if (!tokenInput) return alert("Please supply your Hugging Face Access Token!");
    if (!scriptInput) return alert("Please enter your script first!");

    // Disable button to prevent double-clicks
    generateBtn.disabled = true;
    outputEl.innerHTML = `
        <div class="status-msg">
            <div>⚙️ Pinging Free Serverless Hub Endpoint...</div>
            <div class="status-sub">Querying Qwen2.5-7B-Instruct. Processing data layers...</div>
        </div>`;

    const systemPrompt = `You are a video production automation service. Convert the user's script into a structured JSON array matching this tier: ${tierSelect}. Output exactly 3 to 4 items. You must return ONLY valid, raw JSON array. Do not include markdown code blocks, do not explain anything, do not use backticks.

Expected Format Structural Layout:
[
  {
    "title": "💥 Scene Action Sequence",
    "framing": "Wide Angle // Kinetic Motion Tracking",
    "task": "Extract target reference assets and audio sync blocks.",
    "duration": "45 Mins"
  }
]`;

    // Clean, direct serverless chat format mapping
    const promptInput = `<|im_start|>system\n${systemPrompt}<|im_end|>\n<|im_start|>user\nScript: ${scriptInput}<|im_end|>\n<|im_start|>assistant\n`;
    const targetModelUrl = "https://api-inference.huggingface.co/models/Qwen/Qwen2.5-7B-Instruct";

    let attempts = 0;
    const maxAttempts = 3;

    while (attempts < maxAttempts) {
        try {
            const response = await fetch(targetModelUrl, {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${tokenInput}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    inputs: promptInput,
                    parameters: {
                        max_new_tokens: 1000,
                        return_full_text: false,
                        temperature: 0.1
                    }
                })
            });

            // Handle Cold Starts (503 Error)
            if (response.status === 503) {
                attempts++;
                outputEl.innerHTML = `
                    <div class="status-msg">
                        <div>⏳ Model cluster is waking up (Attempt ${attempts}/${maxAttempts})...</div>
                        <div class="status-sub">Loading weights into Hugging Face GPU memory. Retrying in 8 seconds...</div>
                    </div>`;
                await new Promise(resolve => setTimeout(resolve, 8000));
                continue; 
            }

            if (!response.ok) {
                const errData = await response.json().catch(() => ({}));
                throw new Error(errData.error || `HTTP Error: ${response.status}`);
            }

            const data = await response.json();
            let rawAIString = Array.isArray(data) ? data[0]?.generated_text : data.generated_text;

            if (!rawAIString) throw new Error("The endpoint completed successfully but returned an empty response buffer.");

            const cleanedBlueprint = tryParseAIResponse(rawAIString);
            renderStoryboardUI(cleanedBlueprint, scriptInput);
            return; // Success, break loop!

        } catch (err) {
            console.error("Pipeline Exception:", err);
            outputEl.innerHTML = `
                <div style="color:#f87171; padding:20px; border:1px dashed #f87171; border-radius:12px; background: rgba(248,113,113,0.05); line-height: 1.6;">
                    ❌ Execution Exception: ${err.message}<br><br>
                    <span style="color:#9ca3af; font-size:12px; display:block;">
                        <strong>Quick Check:</strong> Press <code>F12</code> to look at your browser's console tab. If it shows an authentication error, double-check your Hugging Face token value.
                    </span>
                </div>`;
            break;
        }
    }
    // Re-enable the button if something goes wrong so it doesn't stay locked down permanently
    generateBtn.disabled = false;
}

function tryParseAIResponse(rawText) {
    let sanitized = rawText.trim();
    
    // Wipe out markdown wrappers safely
    sanitized = sanitized.replace(/^```json/gi, '').replace(/^```/gm, '').replace(/```$/gm, '').trim();
    sanitized = sanitized.replace(/[\u201C\u201D]/g, '"').replace(/[\u2018\u2019]/g, "'");

    try {
        return JSON.parse(sanitized);
    } catch (jsonErr) {
        // Safe bracket extractor recovery
        const startIdx = sanitized.indexOf('[');
        const endIdx = sanitized.lastIndexOf(']');
        if (startIdx !== -1 && endIdx !== -1 && endIdx > startIdx) {
            return JSON.parse(sanitized.substring(startIdx, endIdx + 1));
        }
        throw new Error("JSON Structural Error. The model output text prose instead of data arrays. Try making your script shorter.");
    }
}

function renderStoryboardUI(blueprint, baselineScript) {
    const outputEl = document.getElementById('outputContainer');
    const generateBtn = document.getElementById('generateBtn');
    if (!outputEl) return;
    outputEl.innerHTML = "";
    
    const boardContainer = document.createElement('div');
    boardContainer.className = "storyboard-grid";
    const genericVector = '<svg viewBox="0 0 160 90" style="width:100%;height:100%;opacity:0.4;"><rect width="160" height="90" fill="none"/><line x1="10" y1="45" x2="150" y2="45" stroke="#374151" stroke-width="0.75" stroke-dasharray="4 4"/><text x="44" y="49" fill="#a855f7" font-size="6" font-family="monospace">[SERVERLESS CORE]</text></svg>';

    let textSegments = baselineScript.split(/[.!?]+/).map(s => s.trim()).filter(s => s.length > 5);

    blueprint.forEach((item, index) => {
        const panelCard = document.createElement('div');
        panelCard.className = "panel-card";
        
        let associatedQuote = textSegments[index] || textSegments[0] || "Active production timeline script sequence element data channel.";
        if (associatedQuote.length > 90) associatedQuote = associatedQuote.substring(0, 87) + "...";

        panelCard.innerHTML = `
            <div class="aspect-16-9 camera-grid">
                ${genericVector}
                <div class="cam-tag">AI PANEL: #${index + 1}</div>
                <div class="time-tag">${item.duration || '30 Mins'}</div>
            </div>
            <div class="meta-bar">
                <div class="meta-title">${item.title || 'Scene Segment'}</div>
                <div class="meta-framing">🎬 ${item.framing || 'Standard Composition'}</div>
            </div>
            <div class="card-content">
                <p class="script-quote">"${associatedQuote}"</p>
                <div class="task-row">
                    <input type="checkbox" class="task-check">
                    <p class="task-text">${item.task || 'Process layout components.'}</p>
                </div>
            </div>`;
        boardContainer.appendChild(panelCard);
    });
    outputEl.appendChild(boardContainer);
    window.currentBlueprint = blueprint;
    if (generateBtn) generateBtn.disabled = false;
}

function copyMarkdown() {
    if (!window.currentBlueprint) return alert("Generate a storyboard dataset first!");
    let md = "# 🎬 Your AI Production Storyboard Guide\n\n";
    window.currentBlueprint.forEach((item, i) => {
        md += `## Panel ${i+1}: ${item.title}\n`;
        md += `- **Framing Layout**: ${item.framing}\n`;
        md += `- **Time Allocation**: ${item.duration}\n`;
        md += `- [ ] **Task**: ${item.task}\n\n---\n\n`;
    });
    navigator.clipboard.writeText(md);
    alert("Copied to clipboard!");
}
