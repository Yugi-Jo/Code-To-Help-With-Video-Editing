<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 AI Storyboard Studio</title>
    <style>
        body { background-color: #0b0f19; color: #f3f4f6; font-family: sans-serif; padding: 20px; max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { color: #a855f7; }
        .config-box { background: #111827; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap; }
        .config-box div { flex: 1; min-width: 250px; }
        label { display: block; font-size: 12px; color: #a855f7; font-weight: bold; margin-bottom: 5px; }
        input, select, textarea { width: 100%; background: #030712; border: 1px solid #374151; color: white; padding: 10px; border-radius: 6px; }
        textarea { height: 200px; margin-bottom: 15px; }
        button { background: #a855f7; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; }
        button:disabled { opacity: 0.5; }
        #outputContainer { background: #111827; padding: 20px; border-radius: 8px; min-height: 200px; margin-top: 20px; }
        .storyboard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .panel-card { background: #030712; border: 1px solid #1f2937; border-radius: 8px; padding: 15px; }
        .panel-title { color: #c084fc; font-weight: bold; margin-bottom: 5px; }
        .panel-meta { font-size: 12px; color: #9ca3af; margin-bottom: 10px; }
        .status-msg { text-align: center; color: #a855f7; padding: 40px; }
    </style>
</head>
<body>

    <header>
        <h1>🎬 AI Storyboard Studio</h1>
        <p style="color: #9ca3af;">Serverless Matrix Node Connection</p>
    </header>

    <div class="config-box">
        <div>
            <label>🔑 Hugging Face Access Token</label>
            <input type="text" id="hfToken" placeholder="hf_xxxxxxxxxxxxxxxxxxxxxxxxxx">
        </div>
        <div>
            <label>📅 Workflow Tier</label>
            <select id="productionTier">
                <option value="tier1">🚀 Speed Run (1-2 Days)</option>
                <option value="tier2">⏳ Steady Grind (3-5 Days)</option>
            </select>
        </div>
    </div>

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
        <div>
            <label>📜 Script Input</label>
            <textarea id="scriptInput" placeholder="Paste script sequences here..."></textarea>
            <button id="generateBtn" onclick="generateStoryboardBlueprint()">⚡ Run Live Inference</button>
        </div>
        <div>
            <label>📋 Production Output</label>
            <div id="outputContainer">Your storyboard cards will render here...</div>
        </div>
    </div>

    <script>
        async function generateStoryboardBlueprint() {
            const tokenInput = document.getElementById('hfToken').value.trim();
            const scriptInput = document.getElementById('scriptInput').value.trim();
            const tierSelect = document.getElementById('productionTier').value;
            const outputEl = document.getElementById('outputContainer');
            const generateBtn = document.getElementById('generateBtn');

            if (!tokenInput || !scriptInput) {
                return alert("Please fill out both your token and script input fields!");
            }

            generateBtn.disabled = true;
            outputEl.innerHTML = `<div class="status-msg">⏳ Querying Qwen Core Framework...</div>`;

            const systemPrompt = `You are a script converter. Convert the script into a JSON array matching this tier: ${tierSelect}. Output exactly 3 items. Return ONLY valid raw JSON array. No markdown, no backticks.
Format: [{"title": "Scene Name", "framing": "Camera Style", "task": "Production task", "duration": "30 Mins"}]`;

            const promptInput = `<|im_start|>system\n${systemPrompt}<|im_end|>\n<|im_start|>user\nScript: ${scriptInput}<|im_end|>\n<|im_start|>assistant\n`;

            try {
                const response = await fetch("https://api-inference.huggingface.co/models/Qwen/Qwen2.5-7B-Instruct", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${tokenInput}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        inputs: promptInput,
                        parameters: { max_new_tokens: 800, return_full_text: false, temperature: 0.1 }
                    })
                });

                if (response.status === 503) {
                    outputEl.innerHTML = `<div class="status-msg">⏳ Model is warming up on servers. Click generate again in 10 seconds!</div>`;
                    generateBtn.disabled = false;
                    return;
                }

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.error || `HTTP Error ${response.status}`);
                }

                const data = await response.json();
                let rawText = Array.isArray(data) ? data[0]?.generated_text : data.generated_text;
                
                if (!rawText) throw new Error("Empty payload returned from infrastructure.");

                // Extraction filter
                const startIdx = rawText.indexOf('[');
                const endIdx = rawText.lastIndexOf(']');
                if (startIdx === -1 || endIdx === -1) throw new Error("AI did not format data as an array. Please retry.");
                
                const blueprint = JSON.parse(rawText.substring(startIdx, endIdx + 1));
                
                // Render Logic
                outputEl.innerHTML = "";
                const grid = document.createElement('div');
                grid.className = "storyboard-grid";

                blueprint.forEach((item, index) => {
                    const card = document.createElement('div');
                    card.className = "panel-card";
                    card.innerHTML = `
                        <div class="panel-title">🎬 Panel ${index + 1}: ${item.title || 'Scene'}</div>
                        <div class="panel-meta">📐 Framing: ${item.framing || 'Standard'} | ⏱️ ${item.duration || '30m'}</div>
                        <p style="font-size:13px; color:#d1d5db;">📋 Task: ${item.task || 'No task assigned.'}</p>
                    `;
                    grid.appendChild(card);
                });
                outputEl.appendChild(grid);

            } catch (err) {
                console.error(err);
                outputEl.innerHTML = `<div style="color:#f87171; padding:15px; border:1px dashed #f87171; border-radius:6px;">❌ Error: ${err.message}</div>`;
            }
            generateBtn.disabled = false;
        }
    </script>
</body>
</html>
