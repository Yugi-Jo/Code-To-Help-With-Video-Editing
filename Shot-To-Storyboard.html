<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>🎬 Vibe-Code Cinematic Director Studio</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0b0f19; color: #f3f4f6; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 24px; max-width: 1500px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 32px; }

        .sub { color: #9ca3af; font-size: 0.9rem; }
        .selector-box { background-color: #111827; border: 1px solid #1f2937; padding: 16px; border-radius: 12px; margin-bottom: 24px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }
        label { font-size: 11px; font-weight: 700; color: #818cf8; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 8px; }

        .workspace-layout { display: grid; grid-template-columns: 1fr; gap: 24px; }

        .panel-card { background-color: #030712; border: 1px solid #1f2937; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2); }

        .camera-grid::before { content: ''; position: absolute; inset: 0; border-left: 1px dashed rgba(99, 102, 241, 0.12); border-right: 1px dashed rgba(99, 102, 241, 0.12); pointer-events: none; }
        .camera-grid::after { content: ''; position: absolute; inset: 0; border-top: 1px dashed rgba(99, 102, 241, 0.12); border-bottom: 1px dashed rgba(99, 102, 241, 0.12); pointer-events: none; }
        .cam-tag { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.75); padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 10px; color: #9ca3af; border: 1px solid #1f2937; }
        .time-tag { position: absolute; bottom: 8px; right: 8px; background: rgba(30, 27, 75, 0.85); padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 10px; color: #a5b4fc; border: 1px solid rgba(99, 102, 241, 0.4); }
        .meta-bar { padding: 12px; background: rgba(17, 24, 39, 0.6); border-bottom: 1px solid #1f2937; }
        .meta-title { color: #a5b4fc; font-weight: 700; font-size: 12px; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.05em; }
        .meta-framing { color: #9ca3af; font-size: 11px; font-family: monospace; }
        .card-content { padding: 14px; flex-grow: 1; display: flex; flex-direction: column; }
        .script-quote { font-size: 12px; color: #fb7185; font-style: italic; margin-bottom: 14px; padding-left: 8px; border-left: 2px solid #f43f5e; line-height: 1.4; }
        
        /* Deep Direction Blocks */
        .directive-section { margin-bottom: 12px; }
        .directive-label { font-size: 10px; font-weight: 800; text-transform: uppercase; color: #f43f5e; margin-bottom: 4px; letter-spacing: 0.05em; }
        .directive-text { font-size: 12.5px; color: #e5e7eb; line-height: 1.5; }
        .rationale-label { font-size: 10px; font-weight: 800; text-transform: uppercase; color: #10b981; margin-bottom: 4px; letter-spacing: 0.05em; }
        .rationale-text { font-size: 12px; color: #9ca3af; line-height: 1.4; font-style: italic; }
        
        .status-msg { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 64px 0; text-align: center; color: #6366f1; font-weight: 600; }
        .status-sub { color: #6b7280; font-size: 12px; margin-top: 6px; }
        .empty-state { color: #4b5563; text-align: center; padding: 48px; font-style: italic; }
    </style>
</head>

            </div>
        </div>
    </div>
