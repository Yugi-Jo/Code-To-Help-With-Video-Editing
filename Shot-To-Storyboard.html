    <title>🎬 Vibe-Code Hardened Director Studio</title>

        * { box-sizing: border-box; margin: 0; padding: 0; }

        header { text-align: center; margin-bottom: 32px; }
        h1 { font-size: 2.2rem; font-weight: 800; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
        .selector-box { background-color: #111827; border: 1px solid #1f2937; padding: 16px; border-radius: 12px; margin-bottom: 24px; }
        select { width: 100%; background-color: #030712; border: 1px solid #374151; padding: 12px; color: #e5e7eb; border-radius: 6px; }
        .workspace-layout { display: grid; grid-template-columns: 380px 1fr; gap: 24px; }
        .panel-left { background-color: #111827; border: 1px solid #1f2937; padding: 16px; border-radius: 12px; height: fit-content; }
        textarea { width: 100%; height: 320px; background-color: #030712; border: 1px solid #1f2937; padding: 16px; color: #e5e7eb; border-radius: 12px; margin-bottom: 16px; }
        button { width: 100%; background: linear-gradient(to right, #6366f1, #a855f7); color: white; font-weight: 700; padding: 14px; border: none; border-radius: 12px; cursor: pointer; }
        #outputContainer { background-color: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 20px; min-height: 550px; }
        .storyboard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; }
        .panel-card { background-color: #030712; border: 1px solid #1f2937; border-radius: 12px; padding: 14px; }
        .script-quote { color: #fb7185; font-style: italic; margin-bottom: 12px; }
        .directive-text, .rationale-text { font-size: 13px; color: #e5e7eb; margin-bottom: 8px; }
    </style>
</head>
