<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Vibe-Code Hardened Director Studio</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0b0f19; color: #f3f4f6; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 24px; max-width: 1500px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 32px; }
        h1 { font-size: 2.2rem; font-weight: 800; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
        .sub { color: #9ca3af; font-size: 0.9rem; }
        .selector-box { background-color: #111827; border: 1px solid #1f2937; padding: 16px; border-radius: 12px; margin-bottom: 24px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }
        label { font-size: 11px; font-weight: 700; color: #818cf8; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 8px; }
        select { width: 100%; background-color: #030712; border: 1px solid #374151; border-radius: 6px; padding: 12px; color: #e5e7eb; font-size: 14px; font-weight: 500; outline: none; }
        select:focus { border-color: #6366f1; }
        .workspace-layout { display: grid; grid-template-columns: 1fr; gap: 24px; }
        @media (min-width: 1100px) { .workspace-layout { grid-template-columns: 380px 1fr; } }
        .panel-left { background-color: #111827; border: 1px solid #1f2937; padding: 16px; border-radius: 12px; height: fit-content; }
        textarea { width: 100%; height: 320px; background-color: #030712; border: 1px solid #1f2937; border-radius: 12px; padding: 16px; color: #e5e7eb; font-size: 14px; resize: none; outline: none; margin-bottom: 16px; line-height: 1.6; }
        textarea:focus { border-color: #818cf8; }
        button { width: 100%; background: linear-gradient(to right, #6366f1, #a855f7); color: white; font-weight: 700; padding: 14px; border: none; border-radius: 12px; cursor: pointer; font-size: 14px; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        .copy-btn { background: rgba(99, 102, 241, 0.15); border: 1px solid rgba(99, 102, 241, 0.4); padding: 6px 12px; border-radius: 6px; color: #818cf8; font-size: 11px; cursor: pointer; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; color: #e5e7eb; font-weight: 600; }
        #outputContainer { background-color: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 20px; min-height: 550px; }
        .storyboard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; }
        .panel-card { background-color: #030712; border: 1px solid #1f2937; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2); }
        .aspect-16-9 { aspect-ratio: 16 / 9; position: relative; overflow: hidden; background: #000; display: flex; align-items: center; justify-content: center; padding: 8px; border-bottom: 1px solid #111827; }
        .camera-grid::before { content: ''; position: absolute; inset: 0; border-left: 1px dashed rgba(99, 102, 241, 0.12); border-right: 1px dashed rgba(99, 102, 241, 0.12); pointer-events: none; }
        .camera-grid::after { content: ''; position: absolute; inset: 0; border-top: 1px dashed rgba(99, 102, 241, 0.12); border-bottom: 1px dashed rgba(99, 102, 241, 0.12); pointer-events: none; }
        .cam-tag { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.75); padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 10px; color: #9ca3af; border: 1px solid #1f2937; }
        .time-tag { position: absolute; bottom: 8px; right: 8px; background: rgba(30, 27, 75, 0.85); padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 10px; color: #a5b4fc; border: 1px solid rgba(99, 102, 241, 0.4); }
        .meta-bar { padding: 12px; background: rgba(17, 24, 39, 0.6); border-bottom: 1px solid #1f2937; }
        .meta-title { color: #a5b4fc; font-weight: 700; font-size: 12px; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.05em; }
        .meta-framing { color: #9ca3af; font-size: 11px; font-family: monospace; }
        .card-content { padding: 14px; flex-grow: 1; display: flex; flex-direction: column; }
        .script-quote { font-size: 12px; color: #fb7185; font-style: italic; margin-bottom: 14px; padding-left: 8px; border-left: 2px solid #f43f5e; line-height: 1.4; }
        .directive-section { margin-bottom: 12px; }
        .directive-label { font-size: 10px; font-weight: 800; text-transform: uppercase; color: #f43f5e; margin-bottom: 4px; letter-spacing: 0.05em; }
        .directive-text { font-size: 12.5px; color: #e5e7eb; line-height: 1.5; }
        .rationale-label { font-size: 10px; font-weight: 800; text-transform: uppercase; color: #10b981; margin-bottom: 4px; letter-spacing: 0.05em; }
        .rationale-text { font-size: 12px; color: #9ca3af; line-height: 1.4; font-style: italic; }
        .status-msg { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 64px 0; text-align: center; color: #6366f1; font-weight: 600; }
        .status-sub { color: #6b7280; font-size: 12px; margin-top: 6px; }
        .empty-state { color: #4b5563; text-align: center; padding: 48px; font-style: italic; }
    </style>
</head>
<body>

    <header>
        <h1>🎬 Vibe-Code: Cinematic Director Studio</h1>
        <div class="sub">Hardened String Matrix — Crash Proof Event Listeners</div>
    </header>

    <div class="selector-box">
        <label>📅 Select Your Project Deadline & Effort Window</label>
        <select id="productionTier">
            <option value="tier1" selected>🚀 Tier 1: Speed Run — High-impact, standalone stock clips & raw anime edits</option>
            <option value="tier2">⏳ Tier 2: Steady Grind — Seamless soundscape layering, clean graphical framing tracking</option>
            <option value="tier3">🏆 Tier 3: Full Masterpiece — Bespoke 3D assets, complex dynamic effects nodes, layered visual compositions</option>
        </select>
    </div>

    <div class="workspace-layout">
        <div class="panel-left">
            <label>📜 Paste Your Script</label>
            <textarea id="scriptInput" placeholder="Paste your script text blocks here... Keywords like anime, mecha, robot, cityscape, rain, or jazz will trigger theme-specific directives."></textarea>
            <button id="generateBtn">⚡ Analyze Cinematic Context</button>
        </div>

        <div>
            <div class="panel-header">
                <div>📋 Intent-Based Production Storyboard</div>
                <button class="copy-btn" id="copyBtn">Copy Director Markdown</button>
            </div>
            <div id="outputContainer" class="empty-state">
                Input your narrative script lines into the control panel to generate specific asset descriptions and editorial justifications...
            </div>
        </div>
    </div>

    <script>
        // Data arrays wrapped completely in clean double quotes to avoid character breaks
        const tierMatrixMap = [
            {
                "triggers": ["robot", "mecha", "monster", "action", "explosion", "flashy", "sequences", "anime"],
                "title": "💥 Core Action Sequence",
                "tier1": {
                    "framing": "Static Mid-Shot // Fast Kinetic Cut",
                    "what": "Source a clean, high-framerate anime clip showcasing giant mecha frames or engines igniting. Keep lighting restricted to dark, saturated neon backdrops with heavy rim edges.",
                    "why": "Establishes immediate scale and weight without visual filler. Dropping straight onto a high-motion action frame prevents immediate retention drop-off.",
                    "time": "15 Mins",
                    "svg": "<svg viewBox=\"0 0 160 90\" style=\"width:100%;height:100%;opacity:0.6;\"><path d=\"M20,70 L50,25 L90,20 L140,55\" stroke=\"#f43f5e\" stroke-width=\"2\" fill=\"none\"/><circle cx=\"50\" cy=\"25\" r=\"6\" fill=\"#6366f1\"/><text x=\"15\" y=\"82\" fill=\"#6b7280\" font-size=\"7\" font-family=\"monospace\">ANIME MECHA ENGINE</text></svg>"
                },
                "tier2": {
                    "framing": "Whip-Pan Transition // Impact Linked",
                    "what": "Isolate high-bitrate anime sequences tracking moving mechanical joints or plates shifting under friction. Drop a heavy mechanical air-pressure hiss SFX directly on the cut slice.",
                    "why": "Tying the mechanical layout to a heavy transient sound design spike tricks the human brain into feeling physical momentum and scale.",
                    "time": "45 Mins",
                    "svg": "<svg viewBox=\"0 0 160 90\" style=\"width:100%;height:100%;opacity:0.6;\"><line x1=\"10\" y1=\"45\" x2=\"150\" y2=\"45\" stroke=\"#6366f1\" stroke-dasharray=\"4 2\"/><path d=\"M60,15 L100,75\" stroke=\"#f43f5e\" stroke-width=\"2\"/><text x=\"40\" y=\"82\" fill=\"#6b7280\" font-size=\"7\" font-family=\"monospace\">TRANSITION WHIP MATRIX</text></svg>"
                },
                "tier3": {
                    "framing": "Multi-Layer Tracking Composite",
                    "what": "Deconstruct clean mecha layout elements inside your software canvas. Apply simulated heads-up display lines, artificial optical glare layers, and multi-directional high-frequency rumble patterns.",
                    "why": "Complex layout stacking builds a custom, high-end atmosphere that separates your timeline edits from standard, low-effort content loops.",
                    "time": "3 Hours",
                    "svg": "<svg viewBox=\"0 0 160 90\" style=\"width:100%;height:100%;opacity:0.6;\"><rect x=\"20\" y=\"15\" width=\"120\" height=\"60\" fill=\"none\" stroke=\"#6366f1\" stroke-width=\"1\"/><circle cx=\"80\" cy=\"45\" r=\"15\" fill=\"none\" stroke=\"#f43f5e\"/><text x=\"32\" y=\"82\" fill=\"#6b7280\" font-size=\"7\" font-family=\"monospace\">HUD TRACK COMPOSITE</text></svg>"
                }
            },
            {
                "triggers": ["model kit", "plastic", "shelf", "toy", "figure", "kits"],
                "title": "🤖 Material Showcase Frame",
                "tier1": {
                    "framing": "Centered Macro Frame // Clean Display",
                    "what": "Inject clear real-world closeups highlighting clean plastic parts, unbuilt model sprues, or unpainted mechanical framing elements laying flat.",
                    "why": "Acts as an immediate pacing anchor. Breaking away from fast cinematic loops into macro physical details keeps layout rhythms dynamic.",
                    "time": "20 Mins",
                    "svg": "<svg viewBox=\"0 0 160 90\" style=\"width:100%;height:100%;opacity:0.6;\"><ellipse cx=\"80\" cy=\"75\" rx=\"45\" ry=\"10\" fill=\"none\" stroke=\"#6b7280\"/><rect x=\"65\" y=\"25\" width=\"30\" height=\"45\" fill=\"none\" stroke=\"#6366f1\"/><text x=\"50\" y=\"15\" fill=\"#f43f5e\" font-size=\"7\" font-family=\"monospace\">MACRO SPRUE AREA</text></svg>"
                },
                "tier2": {
                    "framing": "Keyframed Linear Track Zoom",
                    "what": "Deploy high-quality three-dimensional models of mechanical pieces. Program a continuous, highly uniform dolly path straight along the primary structural connection seams inside the workspace view.",
                    "why": "Sustained linear movement spotlighting core asset designs draws the viewer in, maintaining engagement better than simple static footage extensions.",
                    "time": "60 Mins",
                    "svg": "<svg viewBox=\"0 0 160 90\" style=\"width:100%;height:100%;opacity:0.6;\"><circle cx=\"80\" cy=\"45\" r=\"20\" fill=\"none\" stroke=\"#6366f1\"/><line x1=\"10\" y1=\"10\" x2=\"60\" y2=\"35\" stroke=\"#f43f5e\"/><text x=\"52\" y=\"82\" fill=\"#6b7280\" font-size=\"7\" font-family=\"monospace\">DOLLY TRACK PATH</text></svg>"
                },
                "tier3": {
                    "framing": "Cycles Ray-Traced Node Render",
                    "what": "Configure real model design blueprints inside an interactive workspace layout. Design procedural materials that add custom micro-abrasions, parting flaws, and metallic flecks onto outer frame shells.",
                    "why": "Delivers a completely signature presentation style that cannot be stolen or duplicated, elevating your channels overall layout value.",
                    "time": "4 Hours",
                    "svg": "<svg viewBox=\"0 0 160 90\" style=\"width:100%;height:100%;opacity:0.6;\"><path d=\"M30,30 L130,30 L110,70 L50,70 Z\" fill=\"none\" stroke=\"#6366f1\"/><text x=\"44\" y=\"82\" fill=\"#6b7280\" font-size=\"7\" font-family=\"monospace\">PROCEDURAL ASSET NODE</text></svg>"
                }
            },
            {
                "triggers": ["cityscapes", "empty cityscapes", "empty streets", "window", "rain", "staring", "reflection", "fog"],
                "title": "🌆 Atmospheric Mood Plate",
                "tier1": {
                    "framing": "Locked Horizon Wide // Environmental",
                    "what": "Locate an unedited, looped retro anime backdrop depicting dark urban alleys, neon storefronts, or windows with cascading water trails. Ensure no human figures populate the view.",
                    "why": "Deliberately drops narrative speeds to absolute zero. This sudden stillness forces the audience to feel the heavy isolation baked into the text.",
                    "time": "15 Mins",
                    "svg": "<svg viewBox=\"0 0 160 90\" style=\"width:100%;height:100%;opacity:0.5;\"><line x1=\"0\" y1=\"75\" x2=\"160\" y2=\"75\" stroke=\"#6b7280\"/><rect x=\"25\" y=\"35\" width=\"25\" height=\"40\" fill=\"none\" stroke=\"#6366f1\"/><text x=\"54\" y=\"45\" fill=\"#f43f5e\" font-size=\"8\" font-family=\"monospace\">LOFI URBAN LANDSCAPE</text></svg>"
                },
                "tier2: {
                    "framing": "Asymmetric Split Screen Layer",
                    "what": "Stack active urban plates across separate track grids. Introduce high-contrast black filters over secondary panels while loading low-frequency environmental resonance hums beneath standard voice tracks.",
                    "why": "Geometric screen breaks isolates visual focal spaces, texturing the scene and matching the underlying theme of loneliness.",
                    "time": "45 Mins",
                    "svg": "<svg viewBox=\"0 0 160 90\" style=\"width:100%;height:100%;opacity:0.6;\"><line x1=\"90\" y1=\"0\" x2=\"90\" y2=\"90\" stroke=\"#6366f1\" stroke-width=\"1.5\"/><text x=\"25\" y=\"48\" fill=\"#6b7280\" font-size=\"7\" font-family=\"monospace\">SPLIT VIEW A</text><text x=\"105\" y=\"48\" fill=\"#f43f5e\" font-size=\"7\" font-family=\"monospace\">DARK TRACK</text></svg>"
                },
                "tier3": {
                    "framing": "Multi-Point Matte Bokeh Track",
                    "what": "Import high-fidelity environmental elements into your effects compositor. Target movement trackers to float realistic blurred lighting effects that slide dynamically relative to foreground perspective lines.",
                    "why": "Mimics organic camera lenses, giving slower narrative segments a rich, premium aesthetic that holds onto passive view tracks.",
                    "time": "3 Hours",
                    "svg": "<svg viewBox=\"0 0 160 90\" style=\"width:100%;height:100%;opacity:0.6;\"><circle cx=\"45\" cy=\"35\" r=\"14\" fill=\"none\" stroke=\"#f43f5e\"/><circle cx=\"115\" cy=\"55\" r=\"22\" fill=\"none\" stroke=\"#6366f1\"/><text x=\"42\" y=\"82\" fill=\"#6b7280\" font-size=\"7\" font-family=\"monospace\">COMPOSITED BOKEH DATA</text></svg>"
                }
            },
            {
                "triggers": ["jazz", "track", "music", "softly", "melancholic", "human", "breathe", "clock", "timer", "midnight"],
                "title": "⏳ Temporal Pacing Overlay",
                "tier1": {
                    "framing": "Flat Minimal Graphic Display",
                    "what": "Drop in clean, retro vector graphic assets tracking simple moving dials or linear bar progressions that pace precisely alongside ambient soundtrack tempos.",
                    "why": "Provides a subtle rhythmic tracker to guide viewer sub-conscious focus without forcing heavy visual congestion over critical dialogue.",
                    "time": "15 Mins",
                    "svg": "<svg viewBox=\"0 0 160 90\" style=\"width:100%;height:100%;opacity:0.6;\"><circle cx=\"80\" cy=\"45\" r=\"25\" fill=\"none\" stroke=\"#6366f1\" stroke-width=\"1.5\"/><line x1=\"80\" y1=\"45\" x2=\"95\" y2=\"45\" stroke=\"#f43f5e\" stroke-width=\"2\"/></svg>"
                },
                "tier2": {
                    "framing": "Abstract Particle Vector Drift",
                    "what": "Configure transparency-mapped vector loops featuring micro dust configurations floating upward over dark segments. Match scaling expansions to human inhalation intervals.",
                    "why": "Complements the relaxed, dark tone of slow instrumental scores, feeding the human eye safe, non-distracting kinetic signals during pauses.",
                    "time": "40 Mins",
                    "svg": "<svg viewBox=\"0 0 160 90\" style=\"width:100%;height:100%;opacity:0.6;\"><circle cx=\"35\" cy=\"25\" r=\"3\" fill=\"#6366f1\"/><circle cx=\"125\" cy=\"65\" r=\"4\" fill=\"#f43f5e\"/><text x=\"50\" y=\"80\" fill=\"#6b7280\" font-size=\"7\" font-family=\"monospace\">RESPIRATION VECTOR FLOW</text></svg>"
                },
                "tier3": {
                    "framing": "Dynamic Frequency Spectral Canvas",
                    "what": "Implement native asset visualization lines that process project audio track layers directly. Output reactive waveform curves that deform based on low-end acoustic instruments or drum patterns.",
                    "why": "Unifies audio tracks and screen space into a singular reactive mechanism, transforming transitional breaks into deliberate stylistic elements.",
                    "time": "2.5 Hours",
                    "svg": "<svg viewBox=\"0 0 160 90\" style=\"width:100%;height:100%;opacity:0.6;\"><path d=\"M10,75 C40,25 70,85 100,45 T150,65\" fill=\"none\" stroke=\"#6366f1\" stroke-width=\"1.5\"/><text x=\"44\" y=\"82\" fill=\"#6b7280\" font-size=\"7\" font-family=\"monospace\">SPECTRAL REACTION CANVAS</text></svg>"
                }
            }
        ];

        // Isolated safe Event Listeners to completely prevent browser execution crashes
        document.addEventListener("DOMContentLoaded", () => {
            const generateBtn = document.getElementById("generateBtn");
            const copyBtn = document.getElementById("copyBtn");
            const tierSelect = document.getElementById("productionTier");
            const scriptInputEl = document.getElementById("scriptInput");

            if (generateBtn) {
                generateBtn.addEventListener("click", () => {
                    generateStoryboardBlueprint(scriptInputEl, tierSelect);
                });
            }

            if (copyBtn) {
                copyBtn.addEventListener("click", copyMarkdown);
            }

            if (tierSelect) {
                tierSelect.addEventListener("change", () => {
                    if (scriptInputEl && scriptInputEl.value.trim().length > 10) {
                        generateStoryboardBlueprint(scriptInputEl, tierSelect);
                    }
                });
            }
        });

        function generateStoryboardBlueprint(scriptInputEl, tierSelect) {
            try {
                const outputEl = document.getElementById('outputContainer');
                if (!scriptInputEl || !outputEl || !tierSelect) return;

                const scriptText = scriptInputEl.value.trim();
                const currentTier = tierSelect.value;

                if (!scriptText) {
                    alert('Please paste your video script first!');
                    return;
                }

                outputEl.innerHTML = `
                    <div class="status-msg">
                        <div>⚙️ Analyzing Narrative Tone Parameters...</div>
                        <div class="status-sub">Generating specific asset directives and structural justifications</div>
                    </div>`;

                const sentences = scriptText.split(/[.!?]+/).map(s => s.trim()).filter(s => s.length > 10);
                let processingBlocks = [];

                if (sentences.length <= 1) {
                    processingBlocks.push(scriptText);
                } else {
                    for (let i = 0; i < sentences.length; i += 2) {
                        const block = sentences.slice(i, i + 2).join('. ') + '.';
                        if (block.length > 12) processingBlocks.push(block);
                    }
                }

                let finalBlueprint = [];

                processingBlocks.forEach((block) => {
                    const lowerBlock = block.toLowerCase();
                    let matchedData = null;
                    let topScore = 0;

                    tierMatrixMap.forEach(item => {
                        let score = 0;
                        item.triggers.forEach(word => {
                            if (lowerBlock.includes(word)) score++;
                        });
                        if (score > topScore) {
                            topScore = score;
                            matchedData = item;
                        }
                    });

                    let assetTitle = "🎬 Narrative Transition Sequence";
                    let finalWhat = "Source an atmospheric standalone video clip matching the general dark mood of this script block. Avoid rapid camera shifts to keep focus completely clean.";
                    let finalWhy = "Maintains steady visual continuity across slow narrative beats without overwhelming the script's core pacing.";
                    let allocatedTime = "20 Mins";
                    let frameType = "Standard Frame // Balanced Medium View";
                    let vectorArt = '<svg viewBox="0 0 160 90" style="width:100%;height:100%;opacity:0.4;"><rect width="160" height="90" fill="none"/><line x1="10" y1="45" x2="150" y2="45" stroke="#374151" stroke-dasharray="4 4"/><text x="42" y="49" fill="#6b7280" font-size="6" font-family="monospace">[BALANCED SCENE]</text></svg>';

                    if (matchedData && topScore > 0) {
                        const tierData = matchedData[currentTier];
                        assetTitle = matchedData.title;
                        finalWhat = tierData.what;
                        finalWhy = tierData.why;
                        allocatedTime = tierData.time;
                        frameType = tierData.framing;
                        vectorArt = tierData.svg;
                    } else {
                        if (currentTier === 'tier2') {
                            allocatedTime = "40 Mins";
                            frameType = "Pan Tracking Profile // Keyframe Drift";
                        } else if (currentTier === 'tier3') {
                            allocatedTime = "2.5 Hours";
                            frameType = "Multi-Layer Asset Stack // Composite FX";
                        }
                    }

                    let displayTruncatedLine = block.length > 115 ? block.substring(0, 112) + "..." : block;

                    finalBlueprint.push({
                        title: assetTitle,
                        line: displayTruncatedLine,
                        what: finalWhat,
                        why: finalWhy,
                        duration: allocatedTime,
                        framing: frameType,
                        vector: vectorArt
                    });
                });

                renderStoryboardUI(finalBlueprint);

            } catch (err) {
                console.error("Storyboard Matrix Exception:", err);
                document.getElementById('outputContainer').innerHTML = 
                    `<div style="color:#f87171; padding:20px;">Execution Error: ${err.message}. Check script configuration data.</div>`;
            }
        }

        function renderStoryboardUI(blueprint) {
            const outputEl = document.getElementById('outputContainer');
            if (!outputEl) return;
            
            outputEl.innerHTML = "";
            const boardContainer = document.createElement('div');
            boardContainer.className = "storyboard-grid";
            
            blueprint.forEach((item, index) => {
                const panelCard = document.createElement('div');
                panelCard.className = "panel-card";
                
                panelCard.innerHTML = `
                    <div class="aspect-16-9 camera-grid">
                        ${item.vector}
                        <div class="cam-tag">PANEL #${index + 1}</div>
                        <div class="time-tag">⏱️ Target: ${item.duration}</div>
                    </div>
                    <div class="meta-bar">
                        <div class="meta-title">${item.title}</div>
                        <div class="meta-framing">🎬 ${item.framing}</div>
                    </div>
                    <div class="card-content">
                        <p class="script-quote">"${item.line}"</p>
                        <div class="directive-section">
                            <div class="directive-label">🎯 Visual Directive (The What)</div>
                            <p class="directive-text">${item.what}</p>
                        </div>
                        <div>
                            <div class="rationale-label">🧠 Cinematic Rationale (The Why)</div>
                            <p class="rationale-text">${item.why}</p>
                        </div>
                    </div>
                `;
                boardContainer.appendChild(panelCard);
            });
            
            outputEl.appendChild(boardContainer);
            window.currentBlueprint = blueprint;
        }

        function copyMarkdown() {
            if (!window.currentBlueprint) return alert("Generate a storyboard project layout first!");
            let md = "# 🎬 Your Strategic Director Storyboard Guide\n\n";
            window.currentBlueprint.forEach((item, i) => {
                md += `## Panel ${i+1}: ${item.title} (${item.duration})\n`;
                md += `- **Framing Concept**: ${item.framing}\n`;
                md += `- **Script Lines**: "${item.line}"\n`;
                md += `- **🎯 Visual Directive**: ${item.what}\n`;
                md += `- **🧠 Creative Rationale**: ${item.why}\n\n`;
                md += `---\n\n`;
            });
            navigator.clipboard.writeText(md);
            alert("Director strategic markdown copy completed successfully!");
        }
    </script>
</body>
</html>
