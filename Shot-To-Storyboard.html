<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Vibe-Code Script-to-Storyboard Matrix</title>
    <script src="https://cdn.jsdelivr.net/npm/@unocss/runtime/uno.global.js"></script>
    <style>
        body { background-color: #0b0f19; color: #f3f4f6; font-family: sans-serif; }
        .storyboard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
        .aspect-16-9 { aspect-ratio: 16 / 9; position: relative; overflow: hidden; background: #030712; }
        /* Simulated Camera Grid overlay */
        .camera-grid::before { content: ''; position: absolute; inset: 0; border-left: 1px dashed rgba(244, 63, 94, 0.15); border-right: 1px dashed rgba(244, 63, 94, 0.15); pointer-events: none; }
        .camera-grid::after { content: ''; position: absolute; inset: 0; border-top: 1px dashed rgba(244, 63, 94, 0.15); border-bottom: 1px dashed rgba(244, 63, 94, 0.15); pointer-events: none; }
    </style>
</head>
<body class="p-4 md:p-6 max-w-7xl mx-auto">

    <header class="mb-8 text-center">
        <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500">
            🎬 Vibe-Code: Script-to-Storyboard Matrix
        </h1>
        <p class="text-gray-400 mt-2">Solo Production Unit — Contextual Visual Layouts & Time Budgets Generated Instantly</p>
    </header>

    <!-- Unified Production Selector -->
    <div class="bg-gray-900 border border-gray-800 p-4 rounded-xl mb-6 shadow-lg">
        <label class="block text-xs font-bold text-purple-400 uppercase tracking-wider mb-2">📅 Select Your Project Deadline & Effort Window</label>
        <select id="productionTier" class="w-full bg-gray-950 border border-gray-700 rounded p-3 text-sm text-gray-200 focus:outline-none focus:border-purple-500 font-medium">
            <option value="tier1" selected>🚀 Tier 1: Speed Run (1-2 Days Max) — Rapid gathering, 5-15 min task targets</option>
            <option value="tier2">⏳ Tier 2: Steady Grind (3-5 Days) — Custom edits, 30-90 min task targets</option>
            <option value="tier3">🏆 Tier 3: Full Week Masterpiece — High-fidelity assets, multi-hour deep grinds</option>
        </select>
    </div>

    <!-- Workspace Splitter -->
    <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
        
        <!-- Left Column: Input Script Controls -->
        <div class="xl:col-span-1 flex flex-col h-fit bg-gray-900 border border-gray-800 p-4 rounded-xl shadow-lg">
            <label class="font-semibold text-gray-300 mb-2 block">📜 Paste Your Script</label>
            <textarea id="scriptInput" rows="14" placeholder="Paste your video script here... Try mentioning keywords like anime, mecha, clock, cityscape, rain, or jazz to trigger specific visual framing designs." 
                      class="w-full bg-gray-950 border border-gray-800 rounded-xl p-4 resize-none focus:outline-none focus:border-pink-500 text-gray-200 text-sm mb-4"></textarea>
            <button id="generateBtn" onclick="generateStoryboardBlueprint()" 
                    class="w-full bg-gradient-to-r from-purple-500 to-pink-500 text-white font-bold py-3 px-6 rounded-xl shadow-md hover:opacity-90 transition duration-200">
                ⚡ Generate Visual Storyboard
            </button>
        </div>

        <!-- Right Columns: Output Panels Grid -->
        <div class="xl:col-span-2 flex flex-col">
            <div class="flex justify-between items-center mb-3">
                <label class="font-semibold text-gray-300">📋 Multi-Panel Production Storyboard</label>
                <button onclick="copyMarkdown()" class="text-xs text-purple-400 hover:underline bg-purple-950/40 border border-purple-900/50 px-2 py-1 rounded">Copy Board Markdown</button>
            </div>
            
            <div id="outputContainer" class="bg-gray-900 border border-gray-800 rounded-xl p-4 min-h-[500px] shadow-inner text-gray-400 text-sm">
                Your visual 16:9 layout framing grid and asset checklist will display directly in this viewport panel once calculated...
            </div>
        </div>
    </div>

    <script>
        // Storyboard Matrix equipped with custom inline vector thumbnail wireframes
        const tierMatrixMap = [
            {
                triggers: ['robot', 'mecha', 'monster', 'action', 'explosion', 'flashy', 'sequences', 'anime'],
                title: "💥 Core Video Sequence",
                framing: "Dynamic Tracking Shot // Action Safe",
                tier1: "🚀 Run `yt-dlp` to pull a crisp 1080p source clip matching [CONTEXT]. Cut it tightly in Premiere Pro using the Razor Tool (C) to eliminate setup frames.",
                tier2: "⏳ Gather pristine, unwatermarked [CONTEXT] master files. Align the cuts frame-by-frame on the transient audio peaks of your track and add brief white impact flashes.",
                tier3: "🏆 Build a massive local file folder of high-bitrate [CONTEXT] source logs. Fix variable frame rate audio issues, link sequence into After Effects, and design a custom camera screen shake overlay.",
                timeAllocations: { tier1: "15 Mins", tier2: "45 Mins", tier3: "3 Hours" },
                svgWireframe: `<svg viewBox="0 0 160 90" class="w-full h-full opacity-60"><rect width="160" height="90" fill="none"/><path d="M20,70 L40,30 L70,25 L100,45 L140,20" stroke="#f43f5e" stroke-width="1.5" fill="none" stroke-dasharray="2 2"/><circle cx="70" cy="25" r="8" fill="none" stroke="#a855f7" stroke-width="2"/><polygon points="66,25 74,21 74,29" fill="#a855f7"/><text x="10" y="80" fill="#6b7280" font-size="6" font-family="monospace">[ACTION SUBJECT TARGET]</text></svg>`
            },
            {
                triggers: ['model kit', 'plastic', 'shelf', 'toy', 'figure', 'kits'],
                title: "🤖 3D Showcase Element",
                framing: "Macro Close-Up // Focal Point Lock",
                tier1: "🚀 Load up your baseline Blender turntable template. Instantly drop a bold 3D text layer into the scene highlighting the [CONTEXT] elements mentioned in the beat.",
                tier2: "⏳ Download an optimized 3D model directly corresponding to your [CONTEXT] topic from Sketchfab. Place it inside Blender and keyframe a slow camera zoom targeting the main asset detail.",
                tier3: "🏆 Manually design custom low-poly hard surface elements representing your [CONTEXT] focus in Blender. Unwrap UV coordinates, compile a custom procedural texture node tree, and render via Cycles.",
                timeAllocations: { tier1: "20 Mins", tier2: "60 Mins", tier3: "4 Hours" },
                svgWireframe: `<svg viewBox="0 0 160 90" class="w-full h-full opacity-60"><circle cx="80" cy="45" r="28" fill="none" stroke="#a855f7" stroke-width="1.5"/><line x1="40" y1="45" x2="120" y2="45" stroke="#6b7280" stroke-width="0.5"/><line x1="80" y1="15" x2="80" y2="75" stroke="#6b7280" stroke-width="0.5"/><text x="58" y="48" fill="#f43f5e" font-size="8" font-family="monospace">3D MODEL</text></svg>`
            },
            {
                triggers: ['quiet', 'silence', 'elevator', 'isolation', 'agonizing', 'stretches', 'clock', 'timer'],
                title: "⏳ Minimalist Timing Graphic",
                framing: "Flat Graphic Profile // Centered Alpha",
                tier1: "🚀 Command AI to write a simple local HTML code file for a stark minimalist timer layer reflecting the script's [CONTEXT] theme. Open it in a browser window and screen-record it.",
                tier2: "⏳ Access the raw HTML code file. Inject manual CSS frame animations to configure a slow, heavy pulse fade effect over a central digital ticking counter stylized to match the [CONTEXT] beat.",
                tier3: "🏆 Program a highly customized, reactive HTML canvas timing layout. Weave GSAP properties directly into the source code thread to drive an evolving asset matching the [CONTEXT] mood.",
                timeAllocations: { tier1: "10 Mins", tier2: "30 Mins", tier3: "2 Hours" },
                svgWireframe: `<svg viewBox="0 0 160 90" class="w-full h-full opacity-60"><circle cx="80" cy="45" r="22" fill="none" stroke="#6b7280" stroke-width="1.5"/><text x="62" y="49" fill="#a855f7" font-size="12" font-family="monospace" font-weight="bold">00:00</text><line x1="80" y1="45" x2="80" y2="30" stroke="#f43f5e" stroke-width="1.5"/><line x1="80" y1="45" x2="92" y2="45" stroke="#f43f5e" stroke-width="1.5"/></svg>`
            },
            {
                triggers: ['cityscapes', 'empty cityscapes', 'empty streets', 'ticking clock', 'window', 'rain', 'staring', 'reflection'],
                title: "🌆 Cinematic Overlay B-Roll",
                framing: "Establishing Wide // Rule of Thirds",
                tier1: "🚀 Extract clean uncompressed b-roll footage elements that directly illustrate your [CONTEXT] description. Keep the clip continuous on your primary timeline tracking lane to maintain the focus.",
                tier2: "⏳ Track down raw high-bitrate clips that perfectly embody the visual aesthetic of your [CONTEXT] lines. Stack a subtle, low-opacity dark color wash and mix ambient layer drones beneath.",
                tier3: "🏆 Coordinate a comprehensive composite layer stack inside After Effects. Anchor localized luma track mattes and precise point tracking nodes to seamlessly anchor a rain glass overlay across the [CONTEXT] visual plates.",
                timeAllocations: { tier1: "15 Mins", tier2: "40 Mins", tier3: "2.5 Hours" },
                svgWireframe: `<svg viewBox="0 0 160 90" class="w-full h-full opacity-50"><line x1="0" y1="65" x2="160" y2="65" stroke="#6b7280" stroke-width="1"/><polygon points="20,65 35,30 50,65" fill="none" stroke="#a855f7" stroke-width="1"/><polygon points="45,65 70,15 95,65" fill="none" stroke="#6b7280" stroke-width="1"/><polygon points="85,65 115,40 145,65" fill="none" stroke="#f43f5e" stroke-width="1"/><text x="10" y="20" fill="#6b7280" font-size="6" font-family="monospace">[ENVIRONMENT PLATE]</text></svg>`
            },
            {
                triggers: ['jazz', 'track', 'music', 'softly', 'melancholic', 'human', 'breathe'],
                title: "💨 Floating Abstract Layout",
                framing: "Ambient Overlay // Abstract Canvas",
                tier1: "🚀 Use an AI prompt tool to generate a basic HTML canvas layout that coordinates slow, soft graphical circles shifting against a dark backdrop matching the [CONTEXT] setting.",
                tier2: "⏳ Edit the raw script file, modifying properties to make abstract particle items float gently upward. Calibrate alpha ranges to make them naturally dissolve to mirror the [CONTEXT] pacing.",
                tier3: "🏆 Script an intricate 3D vector coordinate particle field array inside a canvas script. Synchronize partical movement physics to react dynamically with the background [CONTEXT] audio track frequencies.",
                timeAllocations: { tier1: "15 Mins", tier2: "45 Mins", tier3: "3 Hours" },
                svgWireframe: `<svg viewBox="0 0 160 90" class="w-full h-full opacity-60"><circle cx="30" cy="30" r="3" fill="#a855f7" opacity="0.7"/><circle cx="130" cy="25" r="5" fill="#f43f5e" opacity="0.4"/><circle cx="75" cy="65" r="2" fill="#6b7280" opacity="0.8"/><circle cx="100" cy="50" r="4" fill="#a855f7" opacity="0.5"/><path d="M10,80 Q40,50 80,75 T150,40" stroke="#374151" stroke-width="1" fill="none"/></svg>`
            }
        ];

        window.generateStoryboardBlueprint = function() {
            try {
                const scriptInputEl = document.getElementById('scriptInput');
                const outputEl = document.getElementById('outputContainer');
                const tierSelect = document.getElementById('productionTier');

                if (!scriptInputEl || !outputEl || !tierSelect) {
                    alert("System layout sync error, please reload page.");
                    return;
                }

                const scriptText = scriptInputEl.value.trim();
                const currentTier = tierSelect.value;

                if (!scriptText) {
                    alert('Please paste your video script first!');
                    return;
                }

                outputEl.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-12">
                        <span class="text-purple-400 animate-pulse text-base font-semibold mb-2">⚙️ Running Structural Narrative Parse Loop...</span>
                        <p class="text-gray-500 text-xs">Assembling 16:9 camera grids and generating component wireframes</p>
                    </div>`;

                const sentences = scriptText.split(/[.!?]+/).map(s => s.trim()).filter(s => s.length > 10);
                let processingBlocks = [];

                if (sentences.length <= 1) {
                    processingBlocks.push(scriptText);
                } else {
                    for (let i = 0; i < sentences.length; i += 2) {
                        const block = sentences.slice(i, i + 2).join('. ') + '.';
                        if (block.length > 12) processingBlocks.push(block);
                    }
                }

                let finalBlueprint = [];

                processingBlocks.forEach((block) => {
                    const lowerBlock = block.toLowerCase();
                    let matchedData = null;
                    let topScore = 0;
                    let contextualKeyword = "narrative script";

                    const contextKeywords = ['anime', 'mecha', 'robot', 'model kit', 'plastic', 'figure', 'cityscape', 'jazz', 'music', 'teenager', 'rain', 'clock', 'timer'];
                    for (let word of contextKeywords) {
                        if (lowerBlock.includes(word)) {
                            contextualKeyword = word;
                            break;
                        }
                    }

                    tierMatrixMap.forEach(item => {
                        let score = 0;
                        item.triggers.forEach(word => {
                            if (lowerBlock.includes(word)) score++;
                        });
                        if (score > topScore) {
                            topScore = score;
                            matchedData = item;
                        }
                    });

                    let assetTitle = "🎬 General Video Segment";
                    let finalInstruction = "";
                    let allocatedTime = "20 Mins";
                    let frameType = "Standard Frame // Medium Focal Layout";
                    let vectorArt = `<svg viewBox="0 0 160 90" class="w-full h-full opacity-40"><rect width="160" height="90" fill="none"/><line x1="10" y1="45" x2="150" y2="45" stroke="#374151" stroke-width="0.75" stroke-dasharray="4 4"/><text x="45" y="49" fill="#6b7280" font-size="6" font-family="monospace">[GENERIC SOURCE LAYER]</text></svg>`;

                    if (matchedData && topScore > 0) {
                        assetTitle = matchedData.title;
                        finalInstruction = matchedData[currentTier];
                        allocatedTime = matchedData.timeAllocations[currentTier];
                        frameType = matchedData.framing;
                        vectorArt = matchedData.svgWireframe;
                    } else {
                        if (currentTier === 'tier1') {
                            assetTitle = "🚀 Fast-Track Component";
                            finalInstruction = `🚀 Rapidly gather an uncompressed visual asset specifically showing **${contextualKeyword}** content. Drop it onto the timeline using simple scale parameters to keep moving.`;
                            allocatedTime = "15 Mins";
                        } else if (currentTier === 'tier2') {
                            assetTitle = "⏳ Intermediate Workflow Step";
                            finalInstruction = `⏳ Design a targeted sequence highlighting your **${contextualKeyword}** topic. Use position keyframes to track focus and insert a clean whoosh sound under the cut.`;
                            allocatedTime = "45 Mins";
                        } else {
                            assetTitle = "🏆 Masterpiece Development Grid";
                            finalInstruction = `🏆 Build a deep structural timeline configuration around your **${contextualKeyword}** elements. Nest tracks, apply custom color mapping fields, and optimize audio noise filters.`;
                            allocatedTime = "3 Hours";
                        }
                    }

                    finalInstruction = finalInstruction.replace(/\[CONTEXT\]/g, `**${contextualKeyword}**`);

                    let displayTruncatedLine = block.length > 95 ? block.substring(0, 92) + "..." : block;

                    finalBlueprint.push({
                        title: assetTitle,
                        line: displayTruncatedLine,
                        task: finalInstruction,
                        duration: allocatedTime,
                        framing: frameType,
                        vector: vectorArt
                    });
                });

                renderStoryboardUI(finalBlueprint);

            } catch (err) {
                console.error("Critical Storyboard Matrix exception:", err);
                document.getElementById('outputContainer').innerHTML = 
                    `<span class='text-red-400'>Error executing storyboard compilation: ${err.message}. Try clicking generate again.</span>`;
            }
        }

        function renderStoryboardUI(blueprint) {
            const outputEl = document.getElementById('outputContainer');
            if (!outputEl) return;
            
            outputEl.innerHTML = "";
            
            const boardContainer = document.createElement('div');
            boardContainer.className = "storyboard-grid";
            
            blueprint.forEach((item, index) => {
                const panelCard = document.createElement('div');
                panelCard.className = "bg-gray-950 border border-gray-800 rounded-xl overflow-hidden shadow-lg flex flex-col";
                
                panelCard.innerHTML = `
                    <!-- 16:9 Aspect Frame Monitor Box -->
                    <div class="aspect-16-9 camera-grid border-b border-gray-900 flex items-center justify-center p-2 bg-gradient-to-b from-gray-950 to-gray-900">
                        ${item.vector}
                        <div class="absolute top-2 left-2 bg-black/70 px-1.5 py-0.5 rounded font-mono text-[10px] text-gray-400 border border-gray-800">
                            CAM MTR: #${index + 1}
                        </div>
                        <div class="absolute bottom-2 right-2 bg-rose-950/80 px-1.5 py-0.5 rounded font-mono text-[10px] text-rose-400 border border-rose-900/50">
                            ${item.duration}
                        </div>
                    </div>
                    
                    <!-- Meta Specs Bar -->
                    <div class="p-3 bg-gray-900/40 border-b border-gray-900/60 text-[11px] font-mono flex flex-col gap-1">
                        <div class="text-purple-400 font-bold tracking-wide uppercase">${item.title}</div>
                        <div class="text-gray-400 text-xs truncate">🎬 ${item.framing}</div>
                    </div>
                    
                    <!-- Creative Checkbox Task Block -->
                    <div class="p-3 flex-1 flex flex-col justify-between">
                        <p class="text-xs text-gray-500 italic mb-3 line-clamp-2">"${item.line}"</p>
                        <div class="flex items-start gap-2 bg-gray-900/20 p-2 rounded border border-gray-900">
                            <input type="checkbox" class="mt-0.5 accent-pink-500 w-3.5 h-3.5 rounded shrink-0">
                            <p class="text-gray-300 text-xs leading-relaxed">${item.task}</p>
                        </div>
                    </div>
                `;
                boardContainer.appendChild(panelCard);
            });
            
            outputEl.appendChild(boardContainer);
            window.currentBlueprint = blueprint;
        }

        window.copyMarkdown = function() {
            if (!window.currentBlueprint) return alert("Generate a storyboard project grid first!");
            let md = "# 🎬 Your Production Storyboard & Visual Assets Guide\n\n";
            window.currentBlueprint.forEach((item, i) => {
                md += `## Panel ${i+1}: ${item.title}\n`;
                md += `- **Camera Framing Layout**: ${item.framing}\n`;
                md += `- **Target Time Budget**: ${item.duration}\n`;
                md += `- **Script Segment**: "${item.line}"\n`;
                md += `- [ ] **Action Task**: ${item.task}\n\n`;
                md += `---\n\n`;
            });
            navigator.clipboard.writeText(md);
            alert("Storyboard production markdown clipboard copy completed!");
        }
    </script>
</body>
</html>
