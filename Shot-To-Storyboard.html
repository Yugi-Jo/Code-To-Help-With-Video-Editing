<!DOCTYPE html>
<html>
<head>
    <title>Director Studio</title>
</head>
<body style="background-color: #111; color: white; padding: 20px; font-family: sans-serif;">

    <textarea id="scriptInput" style="width: 100%; height: 200px; background: #222; color: #fff; border: 1px solid #444; padding: 10px;" placeholder="Paste script... Try keyword 'mecha'"></textarea>
    
    <select id="productionTier" style="width: 100%; margin-top: 10px; padding: 10px;">
        <option value="tier1">Tier 1: Speed Run</option>
        <option value="tier2">Tier 2: Steady Grind</option>
    </select>

    <button onclick="analyze()" style="width: 100%; margin-top: 10px; padding: 15px; background: blue; color: white; border: none; cursor: pointer;">
        ⚡ ANALYZE SCRIPT
    </button>

    <div id="output" style="margin-top: 20px; border-top: 1px solid #444; padding-top: 20px;"></div>

    <script>
        function analyze() {
            var input = document.getElementById('scriptInput').value.toLowerCase();
            var tier = document.getElementById('productionTier').value;
            var out = document.getElementById('output');
            
            // Logic Island
            var data = [
                {
                    'trigger': 'mecha',
                    'title': '💥 Action Sequence',
                    'tier1': 'Source high-framerate anime mecha clips.',
                    'tier2': 'Layer mechanical SFX on cut points.'
                },
                {
                    'trigger': 'jazz',
                    'title': '🎷 Jazz Atmosphere',
                    'tier1': 'Use slow, moody city shots.',
                    'tier2': 'Sync particle overlays to beat.'
                }
            ];

            out.innerHTML = ""; // Clear old content
            
            data.forEach(function(item) {
                if (input.includes(item.trigger)) {
                    out.innerHTML += "<div style='background:#1a1a1a; padding:15px; margin-bottom:10px; border-left: 5px solid #00f;'>" +
                                     "<h3>" + item.title + "</h3>" +
                                     "<p><b>Instruction:</b> " + item[tier] + "</p>" +
                                     "</div>";
                }
            });
            
            if (out.innerHTML === "") {
                out.innerHTML = "No matches found. Try typing 'mecha' or 'jazz'.";
            }
        }
    </script>
</body>
</html>
