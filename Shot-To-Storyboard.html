<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 AI Storyboard Studio</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0b0f19; color: #f3f4f6; font-family: system-ui, sans-serif; padding: 30px; max-width: 1100px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { color: #a855f7; margin-bottom: 5px; }
        .config-box { background: #111827; padding: 20px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #1f2937; }
        label { display: block; font-size: 12px; color: #a855f7; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
        input, textarea { width: 100%; background: #030712; border: 1px solid #374151; color: white; padding: 12px; border-radius: 6px; font-size: 14px; margin-bottom: 15px; outline: none; }
        input:focus, textarea:focus { border-color: #a855f7; }
        textarea { height: 180px; resize: none; }
        button { background: #a855f7; color: white; border: none; padding: 14px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; font-size: 14px; }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #outputContainer { background: #111827; padding: 20px; border-radius: 8px; min-height: 150px; border: 1px solid #1f2937; color: #9ca3af; margin-top: 10px; }
        .storyboard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        .panel-card { background: #030712; border: 1px solid #1f2937; border-radius: 8px; padding: 16px; }
        .panel-title { color: #c084fc; font-weight: bold; margin-bottom: 5px; }
        .status-msg { text-align: center; color: #a855f7; padding: 40px; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1>🎬 AI Storyboard Studio</h1>
        <p style="color: #9ca3af;">Serverless API Workstation Layout</p>
    </header>

    <div class="config-box">
        <label>🔑 Hugging Face Fine-Grained Access Token</label>
        <input type="text" id="hfToken" placeholder="hf_xxxxxxxxxxxxxxxxxxxxxxxxxx">
        
        <label>📜 Video Script Input</label>
        <textarea id="scriptInput" placeholder="Paste your script text blocks here..."></textarea>
        
        <button id="generateBtn" onclick="runInference()">⚡ Generate Storyboard</button>
    </div>

    <label>📋 Rendered Studio Panels</label>
    <div id="outputContainer">Your generated cards will output here...</div>

    <script>
        async function runInference() {
            const token = document.getElementById('hfToken').value.trim();
            const script = document.getElementById('scriptInput').value.trim();
            const output = document.getElementById('outputContainer');
            const btn = document.getElementById('generateBtn');

            if (!token || !script) return alert("Please fill in both fields!");

            btn.disabled = true;
            output.innerHTML = `<div class="status-msg">⏳ Pinging Serverless Model Pipeline...</div>`;

            // Clean direct instruction schema for direct text generation routing
            const cleanPrompt = `You are an expert storyboard visual planner. Convert the script below into a raw JSON array matching this strict schema template format with exactly 3 panel steps. Do not use any markdown boxes, do not write backticks, do not write explanations. Return only valid array text.

Expected schema:
[{"title": "Scene Name", "framing": "Shot Type", "task": "Production action detail"}]

Script data:
${script}`;

            try {
                // Reverted back to the native model execution route that matches Fine-Grained Provider scopes
                const res = await fetch("https://api-inference.huggingface.co/models/Qwen/Qwen2.5-7B-Instruct", {
                    method: "POST",
                    headers: { 
                        "Authorization": `Bearer ${token}`, 
                        "Content-Type": "application/json" 
                    },
                    body: JSON.stringify({
                        inputs: cleanPrompt,
                        parameters: { max_new_tokens: 600, return_full_text: false, temperature: 0.1 }
                    })
                });

                if (res.status === 503) {
                    output.innerHTML = `<div class="status-msg">⏳ Model cluster is currently warming up on server nodes. Please click run again in 10 seconds!</div>`;
                    btn.disabled = false;
                    return;
                }

                if (!res.ok) {
                    const errorDetails = await res.json().catch(() => ({}));
                    throw new Error(errorDetails.error || `HTTP Error Code: ${res.status}`);
                }

                const outData = await res.json();
                let text = Array.isArray(outData) ? outData[0]?.generated_text : outData.generated_text;

                if (!text) throw new Error("The pipeline executed successfully but returned a blank payload stream.");

                // Safe bracket alignment isolation parser
                const startIdx = text.indexOf('[');
                const endIdx = text.lastIndexOf(']');
                if (startIdx === -1 || endIdx === -1) throw new Error("The model did not format response as a clean JSON data array.");

                const cleanArray = JSON.parse(text.substring(startIdx, endIdx + 1));
                
                output.innerHTML = "";
                const grid = document.createElement('div');
                grid.className = "storyboard-grid";

                cleanArray.forEach((item, index) => {
                    const card = document.createElement('div');
                    card.className = "panel-card";
                    card.innerHTML = `
                        <div class="panel-title">🎬 Card ${index + 1}: ${item.title || 'Scene Step'}</div>
                        <p style="font-size:13px; color:#9ca3af; margin-bottom:8px;">📐 Framing: ${item.framing || 'Standard composition'}</p>
                        <p style="font-size:13px; color:#e5e7eb;">⚙️ Task: ${item.task || 'Process production files.'}</p>
                    `;
                    grid.appendChild(card);
                });
                output.appendChild(grid);

            } catch (err) {
                output.innerHTML = `
                    <div style="color:#f87171; padding:15px; border:1px dashed #f87171; border-radius:6px; background: rgba(248,113,113,0.02); line-height: 1.5;">
                        ❌ Network Exception: ${err.message}<br><br>
                        <span style="color:#9ca3af; font-size:12px;">
                            💡 <strong>Quick Fix:</strong> If you are testing this file directly from your computer folders, look at your address bar. If it says <code>file:///</code>, modern web security rules can block out-going API calls. To bypass this restriction instantly, pause your web browser's adblock shields (like Brave Shields or uBlock Origin) on this tab.
                        </span>
                    </div>`;
            }
            btn.disabled = false;
        }
    </script>
</body>
</html>
