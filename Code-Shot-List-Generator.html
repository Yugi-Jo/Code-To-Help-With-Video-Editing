<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Cloud AI Shot List Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/@unocss/runtime"></script>
    <style>
        body { background-color: #0b0f19; color: #f3f4f6; font-family: sans-serif; }
    </style>
</head>
<body class="p-6 max-w-4xl mx-auto">

    <header class="mb-8 text-center">
        <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500">
            🎬 Vibe-Code: Script to B-Roll
        </h1>
        <p class="text-gray-400 mt-2">Premium Cloud AI — 0MB Device Storage Required</p>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <div class="flex flex-col">
            <label class="font-semibold text-gray-300 mb-2">📜 Paste Your Script</label>
            <textarea id="scriptInput" rows="12" placeholder="Paste your script here..." 
                      class="w-full h-full bg-gray-900 border border-gray-800 rounded-xl p-4 resize-none focus:outline-none focus:border-pink-500 shadow-inner text-gray-200"></textarea>
            <button id="generateBtn" onclick="generateCloudAI()" 
                    class="mt-4 bg-gradient-to-r from-purple-500 to-pink-500 text-white font-bold py-3 px-6 rounded-xl shadow-md hover:opacity-90 transition duration-200">
                ⚡ Generate Shot List
            </button>
        </div>

        <div class="flex flex-col">
            <div class="flex justify-between items-center mb-2">
                <label class="font-semibold text-gray-300">📋 Shot List Checklist</label>
                <button onclick="copyMarkdown()" class="text-xs text-purple-400 hover:underline">Copy Markdown</button>
            </div>
            <div id="outputContainer" class="bg-gray-900 border border-gray-800 rounded-xl p-4 h-96 overflow-y-auto shadow-inner text-gray-400 text-sm">
                Your B-Roll suggestions will appear here...
            </div>
        </div>
    </div>

    <script type="module">
        window.generateCloudAI = async function() {
            const scriptText = document.getElementById('scriptInput').value.trim();
            const output = document.getElementById('outputContainer');

            if (!scriptText) {
                alert('Please paste a script first!');
                return;
            }

            output.innerHTML = "<span class='text-purple-400 animate-pulse'>Cloud AI is dreaming up your visual layout... 🍳</span>";

            // Breaking script by paragraphs to give the AI digestible chunks
            const paragraphs = scriptText.split('\n\n').filter(p => p.trim().length > 10);
            let shotCollection = [];

            try {
                for (let block of paragraphs) {
                    block = block.trim();
                    
                    const prompt = `You are an expert video director. Describe one highly creative, cinematic B-roll camera shot to visually match this script segment: "${block}". Provide ONLY the shot description, nothing else.`;

                    // Using an open proxy to smash through browser CORS limits, routing to a public text-model
                    const targetUrl = 'https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.2';
                    const proxyUrl = 'https://cors-anywhere.herokuapp.com/';

                    const response = await fetch(proxyUrl + targetUrl, {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'X-Requested-With': 'XMLHttpRequest'
                        },
                        body: JSON.stringify({ inputs: prompt })
                    });

                    const data = await response.json();
                    
                    if (!response.ok) {
                        // If the public proxy demo needs a quick activation click
                        if (response.status === 403) {
                            throw new Error("Proxy Activation Required. Please visit cors-anywhere.herokuapp.com/corsdemo and click 'Request temporary access', then return here and try again!");
                        }
                        throw new Error(data.error || "Server connection hiccup.");
                    }

                    let rawAiText = data[0].generated_text;
                    let cleanShot = rawAiText.replace(prompt, "").trim().split('\n')[0];

                    shotCollection.push({
                        line: block.substring(0, 60) + "...",
                        shot: cleanShot || "Dynamic B-Roll tracking shot capturing the tone of the narrative."
                    });
                }

                renderShots(shotCollection);

            } catch (error) {
                console.error(error);
                output.innerHTML = `
                    <span class='text-red-400 font-semibold'>Pipeline Notice:</span><br>
                    <span class='text-gray-400 block mt-2 text-xs bg-black p-2 rounded border border-gray-800 font-mono'>${error.message}</span>
                `;
            }
        }

        function renderShots(shots) {
            const output = document.getElementById('outputContainer');
            output.innerHTML = "";
            
            shots.forEach((item, index) => {
                const shotDiv = document.createElement('div');
                shotDiv.className = "mb-4 pb-3 border-b border-gray-800 last:border-0";
                shotDiv.innerHTML = `
                    <p class="text-xs text-gray-500 italic mb-1">Focus Context: "${item.line}"</p>
                    <div class="flex items-start gap-2">
                        <input type="checkbox" class="mt-1 accent-purple-500">
                        <span class="text-gray-200 font-medium"><strong>Shot ${index+1}:</strong> ${item.shot}</span>
                    </div>
                `;
                output.appendChild(shotDiv);
            });
            
            window.currentShots = shots;
        }

        window.copyMarkdown = function() {
            if (!window.currentShots) return alert("Nothing to copy yet!");
            let md = "## 🎬 Shot List\n\n";
            window.currentShots.forEach((item, i) => {
                md += `- [ ] **Shot ${i+1}** (Line: "${item.line}"): ${item.shot}\n`;
            });
            navigator.clipboard.writeText(md);
            alert("Markdown checklist copied to clipboard!");
        }
    </script>
</body>
</html>
