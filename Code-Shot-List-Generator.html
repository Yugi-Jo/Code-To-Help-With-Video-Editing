<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Vibe-Code Context & Time Matrix</title>
    <script src="https://cdn.jsdelivr.net/npm/@unocss/runtime/uno.global.js"></script>
    <style>
        body { background-color: #0b0f19; color: #f3f4f6; font-family: sans-serif; }
    </style>
</head>
<body class="p-6 max-w-6xl mx-auto">

    <header class="mb-8 text-center">
        <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500">
            🎬 Vibe-Code: Script-Specific Asset Matrix
        </h1>
        <p class="text-gray-400 mt-2">Precision Control — Context-aware video tasks paired with custom timeline budgets</p>
    </header>

    <div class="bg-gray-900 border border-gray-800 p-4 rounded-xl mb-6 shadow-lg">
        <label class="block text-xs font-bold text-purple-400 uppercase tracking-wider mb-2">📅 Select Your Project Deadline & Effort Window</label>
        <select id="productionTier" class="w-full bg-gray-950 border border-gray-700 rounded p-3 text-sm text-gray-200 focus:outline-none focus:border-purple-500 font-medium">
            <option value="tier1" selected>🚀 Tier 1: Speed Run (1-2 Days Max) — Rapid gathering, 5-15 min task targets</option>
            <option value="tier2">⏳ Tier 2: Steady Grind (3-5 Days) — Custom edits, 30-90 min task targets</option>
            <option value="tier3">🏆 Tier 3: Full Week Masterpiece — High-fidelity assets, multi-hour deep grinds</option>
        </select>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <div class="flex flex-col">
            <label class="font-semibold text-gray-300 mb-2">📜 Paste Your Script</label>
            <textarea id="scriptInput" rows="12" placeholder="Paste your script here..." 
                      class="w-full h-full bg-gray-900 border border-gray-800 rounded-xl p-4 resize-none focus:outline-none focus:border-pink-500 shadow-inner text-gray-200"></textarea>
            <button id="generateBtn" onclick="generateSpecificBlueprint()" 
                    class="mt-4 bg-gradient-to-r from-purple-500 to-pink-500 text-white font-bold py-3 px-6 rounded-xl shadow-md hover:opacity-90 transition duration-200">
                ⚡ Generate Context-Specific Blueprint
            </button>
        </div>

        <div class="flex flex-col">
            <div class="flex justify-between items-center mb-2">
                <label class="font-semibold text-gray-300">📋 Actionable Asset Blueprint</label>
                <button onclick="copyMarkdown()" class="text-xs text-purple-400 hover:underline">Copy Markdown</button>
            </div>
            <div id="outputContainer" class="bg-gray-900 border border-gray-800 rounded-xl p-4 h-96 overflow-y-auto shadow-inner text-gray-400 text-sm">
                Your customized pipeline breakdown featuring context matching and calculated shot durations will appear here...
            </div>
        </div>
    </div>

    <script>
        // Matrix updated to support context parsing replacements and granular asset targeting
        const tierMatrixMap = [
            {
                triggers: ['robot', 'mecha', 'monster', 'action', 'explosion', 'flashy', 'sequences', 'anime'],
                title: "💥 Core Video Sequence",
                tier1: "🚀 **Task:** Run `yt-dlp` to pull a crisp 1080p source clip matching [CONTEXT]. Cut it tightly in Premiere Pro using the Razor Tool (C) to eliminate setup frames.",
                tier2: "⏳ **Task:** Gather pristine, unwatermarked [CONTEXT] master files. Align the cuts frame-by-frame on the transient audio peaks of your track and add brief white impact flashes.",
                tier3: "🏆 **Task:** Build a massive local file folder of high-bitrate [CONTEXT] source logs. Fix variable frame rate audio issues, link sequence into After Effects, and design a custom camera screen shake overlay.",
                timeAllocations: { tier1: "15 Mins", tier2: "45 Mins", tier3: "3 Hours" }
            },
            {
                triggers: ['model kit', 'plastic', 'shelf', 'toy', 'figure', 'kits'],
                title: "🤖 3D Showcase Element",
                tier1: "🚀 **Task:** Load up your baseline Blender turntable template. Instantly drop a bold 3D text layer into the scene highlighting the [CONTEXT] elements mentioned in the beat.",
                tier2: "⏳ **Task:** Download an optimized 3D model directly corresponding to your [CONTEXT] topic from Sketchfab. Place it inside Blender and keyframe a slow camera zoom targeting the main asset detail.",
                tier3: "🏆 **Task:** Manually design custom low-poly hard surface elements representing your [CONTEXT] focus in Blender. Unwrap UV coordinates, compile a custom procedural texture node tree, and render via Cycles.",
                timeAllocations: { tier1: "20 Mins", tier2: "60 Mins", tier3: "4 Hours" }
            },
            {
                triggers: ['quiet', 'silence', 'elevator', 'isolation', 'agonizing', 'stretches'],
                title: "⏳ Minimalist Structural Timing Graphic",
                tier1: "🚀 **Task:** Command AI to write a simple local HTML code file for a stark minimalist timer layer reflecting the script's [CONTEXT] theme. Open it in a browser window and screen-record it.",
                tier2: "⏳ **Task:** Access the raw HTML code file. Inject manual CSS frame animations to configure a slow, heavy pulse fade effect over a central digital ticking counter stylized to match the [CONTEXT] beat.",
                tier3: "🏆 **Task:** Program a highly customized, reactive HTML canvas timing layout. Weave GSAP properties directly into the source code thread to drive an evolving asset matching the [CONTEXT] mood.",
                timeAllocations: { tier1: "10 Mins", tier2: "30 Mins", tier3: "2 Hours" }
            },
            {
                triggers: ['cityscapes', 'empty cityscapes', 'empty streets', 'ticking clock', 'window', 'rain', 'staring', 'reflection'],
                title: "🌆 Cinematic Overlay B-Roll",
                tier1: "🚀 **Task:** Extract clean uncompressed b-roll footage elements that directly illustrate your [CONTEXT] description. Keep the clip continuous on your primary timeline tracking lane to maintain the focus.",
                tier2: "⏳ **Task:** Track down raw high-bitrate clips that perfectly embody the visual aesthetic of your [CONTEXT] lines. Stack a subtle, low-opacity dark color wash and mix ambient layer drones beneath.",
                tier3: "🏆 **Task:** Coordinate a comprehensive composite layer stack inside After Effects. Anchor localized luma track mattes and precise point tracking nodes to seamlessly anchor a rain glass overlay across the [CONTEXT] visual plates.",
                timeAllocations: { tier1: "15 Mins", tier2: "40 Mins", tier3: "2.5 Hours" }
            },
            {
                triggers: ['jazz', 'track', 'music', 'softly', 'melancholic', 'human', 'breathe'],
                title: "💨 Floating Abstract Atmosphere Layout",
                tier1: "🚀 **Task:** Use an AI prompt tool to generate a basic HTML canvas layout that coordinates slow, soft graphical circles shifting against a dark backdrop matching the [CONTEXT] setting.",
                tier2: "⏳ **Task:** Edit the raw script file, modifying properties to make abstract particle items float gently upward. Calibrate alpha ranges to make them naturally dissolve to mirror the [CONTEXT] pacing.",
                tier3: "🏆 **Task:** Script an intricate 3D vector coordinate particle field array inside a canvas script. Synchronize partical movement physics to react dynamically with the background [CONTEXT] audio track frequencies.",
                timeAllocations: { tier1: "15 Mins", tier2: "45 Mins", tier3: "3 Hours" }
            }
        ];

        window.generateSpecificBlueprint = function() {
            try {
                const scriptInputEl = document.getElementById('scriptInput');
                const outputEl = document.getElementById('outputContainer');
                const tierSelect = document.getElementById('productionTier');

                if (!scriptInputEl || !outputEl || !tierSelect) {
                    alert("System layout sync error, please reload page.");
                    return;
                }

                const scriptText = scriptInputEl.value.trim();
                const currentTier = tierSelect.value;

                if (!scriptText) {
                    alert('Please paste your video script first!');
                    return;
                }

                outputEl.innerHTML = "<span class='text-purple-400 animate-pulse'>Analyzing script vocabulary and estimating shot times... ⚙️</span>";

                const sentences = scriptText.split(/[.!?]+/).map(s => s.trim()).filter(s => s.length > 10);
                let processingBlocks = [];

                if (sentences.length <= 1) {
                    processingBlocks.push(scriptText);
                } else {
                    for (let i = 0; i < sentences.length; i += 2) {
                        const block = sentences.slice(i, i + 2).join('. ') + '.';
                        if (block.length > 12) processingBlocks.push(block);
                    }
                }

                let finalBlueprint = [];

                processingBlocks.forEach((block) => {
                    const lowerBlock = block.toLowerCase();
                    let matchedData = null;
                    let topScore = 0;
                    let contextualKeyword = "narrative script";

                    // Context Finder: Extract key vocabulary to anchor directly into tasks
                    const contextKeywords = ['anime', 'mecha', 'robot', 'model kit', 'plastic', 'figure', 'cityscape', 'jazz', 'music', 'teenager', 'rain'];
                    for (let word of contextKeywords) {
                        if (lowerBlock.includes(word)) {
                            contextualKeyword = word;
                            break;
                        }
                    }

                    tierMatrixMap.forEach(item => {
                        let score = 0;
                        item.triggers.forEach(word => {
                            if (lowerBlock.includes(word)) score++;
                        });
                        if (score > topScore) {
                            topScore = score;
                            matchedData = item;
                        }
                    });

                    let assetTitle = "🎬 General Narrative Segment";
                    let finalInstruction = "";
                    let allocatedTime = "20 Mins";

                    if (matchedData && topScore > 0) {
                        assetTitle = matchedData.title;
                        finalInstruction = matchedData[currentTier];
                        allocatedTime = matchedData.timeAllocations[currentTier];
                    } else {
                        // Tailored fallbacks that capture extracted vocabulary keywords automatically
                        if (currentTier === 'tier1') {
                            assetTitle = "🚀 Fast-Track Component";
                            finalInstruction = `🚀 **Task:** Rapidly gather an uncompressed visual asset specifically showing **${contextualKeyword}** content. Drop it onto the timeline using simple scale parameters to keep moving.`;
                            allocatedTime = "15 Mins";
                        } else if (currentTier === 'tier2') {
                            assetTitle = "⏳ Intermediate Workflow Step";
                            finalInstruction = `⏳ **Task:** Design a targeted sequence highlighting your **${contextualKeyword}** topic. Use position keyframes to track focus and insert a clean whoosh sound under the cut.`;
                            allocatedTime = "45 Mins";
                        } else {
                            assetTitle = "🏆 Masterpiece Development Grid";
                            finalInstruction = `🏆 **Task:** Build a deep structural timeline configuration around your **${contextualKeyword}** elements. Nest tracks, apply custom color mapping fields, and optimize audio noise filters.`;
                            allocatedTime = "3 Hours";
                        }
                    }

                    // Dynamically swap template strings with localized keyword insights
                    finalInstruction = finalInstruction.replace(/\[CONTEXT\]/g, `**${contextualKeyword}**`);

                    let displayTruncatedLine = block.length > 85 ? block.substring(0, 82) + "..." : block;

                    finalBlueprint.push({
                        title: assetTitle,
                        line: displayTruncatedLine,
                        task: finalInstruction,
                        duration: allocatedTime
                    });
                });

                renderBlueprintUI(finalBlueprint);

            } catch (err) {
                console.error("Critical Matrix runtime intercept:", err);
                document.getElementById('outputContainer').innerHTML = 
                    `<span class='text-red-400'>Error executing tier profiles: ${err.message}. Try hitting generate again.</span>`;
            }
        }

        function renderBlueprintUI(blueprint) {
            const outputEl = document.getElementById('outputContainer');
            if (!outputEl) return;
            
            outputEl.innerHTML = "";
            
            blueprint.forEach((item, index) => {
                const stepBlock = document.createElement('div');
                stepBlock.className = "mb-6 pb-4 border-b border-gray-800 last:border-0 bg-gray-950 p-4 rounded-xl shadow-inner border border-gray-900";
                stepBlock.innerHTML = `
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-xs font-bold px-2 py-0.5 rounded bg-purple-950 text-purple-300 border border-purple-800">${item.title}</span>
                        <div class="flex items-center gap-2">
                            <span class="text-xs font-mono font-bold text-pink-400 bg-pink-950/40 border border-pink-900/50 px-2 py-0.5 rounded">⏱️ Setup: ${item.duration}</span>
                            <span class="text-gray-500 font-mono text-xs">Asset ${index+1}</span>
                        </div>
                    </div>
                    <p class="text-xs text-gray-500 italic mb-3">Script Beat: "${item.line}"</p>
                    <div class="flex items-start gap-3">
                        <input type="checkbox" class="mt-1 accent-pink-500 w-4 h-4 rounded">
                        <p class="text-gray-200 text-sm leading-relaxed flex-1">${item.task}</p>
                    </div>
                `;
                outputEl.appendChild(stepBlock);
            });
            
            window.currentBlueprint = blueprint;
        }

        window.copyMarkdown = function() {
            if (!window.currentBlueprint) return alert("Nothing to copy yet!");
            let md = "# 🎬 Your Customized Solo Production Blueprint\n\n";
            window.currentBlueprint.forEach((item, i) => {
                md += `### Asset ${i+1}: ${item.title} (⏱️ Budget: ${item.duration})\n`;
                md += `- **Script Beat Focus**: "${item.line}"\n`;
                md += `- [ ] ${item.task}\n\n`;
            });
            navigator.clipboard.writeText(md);
            alert("Customized production blueprint markdown copied to clipboard!");
        }
    </script>
</body>
</html>
