<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Vibe-Code Workflow Matrix Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@unocss/runtime/uno.global.js"></script>
    <style>
        body { background-color: #0b0f19; color: #f3f4f6; font-family: sans-serif; }
    </style>
</head>
<body class="p-6 max-w-6xl mx-auto">

    <header class="mb-8 text-center">
        <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500">
            🎬 Vibe-Code: Script to Asset Matrix Pro
        </h1>
        <p class="text-gray-400 mt-2">Precision Blueprint — Fixed Repetition Loops & Calibrated Emotional Pacing</p>
    </header>

    <div class="bg-gray-900 border border-gray-800 p-4 rounded-xl mb-6 grid grid-cols-1 md:grid-cols-2 gap-4 shadow-lg">
        <div>
            <label class="block text-xs font-bold text-purple-400 uppercase tracking-wider mb-2">⏱️ Software Time Scope Investment</label>
            <select id="timeScope" class="w-full bg-gray-950 border border-gray-700 rounded p-2 text-sm text-gray-200 focus:outline-none focus:border-purple-500">
                <option value="level1">⏱️ Level 1: Micro (Under 2 Hours - Templates, Fast Clips, Simple Code)</option>
                <option value="level2" selected>⏳ Level 2: Short-Form (1–2 Days - Custom Assets, Sound Design, Edits)</option>
                <option value="level3">📆 Level 3: Macro (1–3 Weeks - Full Season Archiving, Pro 3D/UI Grinds)</option>
            </select>
        </div>
        <div>
            <label class="block text-xs font-bold text-pink-400 uppercase tracking-wider mb-2">🧠 Technical Difficulty Level</label>
            <select id="difficultyLevel" class="w-full bg-gray-950 border border-gray-700 rounded p-2 text-sm text-gray-200 focus:outline-none focus:border-pink-500">
                <option value="beginner">🟢 Level 1: Beginner (Viewport basics, Unmodified templates, Simple cuts)</option>
                <option value="intermediate" selected>🟡 Level 2: Intermediate (Keyframes, UV unwrapping, Custom layout tweaks)</option>
                <option value="advanced">🔴 Level 3: Advanced (VFR Repair, Audio tracking sync, Complex UI assets)</option>
            </select>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <div class="flex flex-col">
            <label class="font-semibold text-gray-300 mb-2">📜 Paste Your Script</label>
            <textarea id="scriptInput" rows="12" placeholder="Paste your script here..." 
                      class="w-full h-full bg-gray-900 border border-gray-800 rounded-xl p-4 resize-none focus:outline-none focus:border-pink-500 shadow-inner text-gray-200"></textarea>
            <button id="generateBtn" onclick="generateMatrixShots()" 
                    class="mt-4 bg-gradient-to-r from-purple-500 to-pink-500 text-white font-bold py-3 px-6 rounded-xl shadow-md hover:opacity-90 transition duration-200">
                ⚡ Generate Calibrated Blueprint
            </button>
        </div>

        <div class="flex flex-col">
            <div class="flex justify-between items-center mb-2">
                <label class="font-semibold text-gray-300">📋 Actionable Asset Blueprint</label>
                <button onclick="copyMarkdown()" class="text-xs text-purple-400 hover:underline">Copy Markdown</button>
            </div>
            <div id="outputContainer" class="bg-gray-900 border border-gray-800 rounded-xl p-4 h-96 overflow-y-auto shadow-inner text-gray-400 text-sm">
                Your customized pipeline breakdown based on software execution metrics will appear here...
            </div>
        </div>
    </div>

    <script>
        // Completely overhauled dictionary mapping to eliminate repetition and match emotional pacing
        const scriptThematicMap = [
            {
                triggers: ['robot', 'mecha', 'monster', 'action', 'explosion', 'flashy', 'sequences'],
                title: "💥 Punchy Action Sequence",
                level1: "Use a premium desktop command utility like yt-dlp to download source clips cleanly in crisp 1080p/4K without pixelation compression.",
                level2: "Import 4K unwatermarked source clips into Premiere Pro. Meticulously slice and align frame cuts right on the heavy transient spikes/beats of your background music audio timeline.",
                level3: "Build an intensive local archive of full anime episodes. Map out structural pacing, fix variable frame rate audio drift, and composite multi-layered impact frames synchronously.",
                beginner: "Workflow Target: Beginner. Focus entirely on timeline mechanics, using the Razor Tool (C) to eliminate awkward dead spaces between action shifts.",
                intermediate: "Workflow Target: Intermediate. Use keyframed positional shifts and layer masks to emphasize heavy motion tracking fields around active subjects.",
                advanced: "Workflow Target: Advanced. Establish a direct dynamic link with After Effects to handle high-fidelity frame compositing, screen shakes, and color maps."
            },
            {
                triggers: ['model kit', 'plastic', 'shelf', 'toy', 'figure', 'kits'],
                title: "🤖 3D Mecha Showcase Asset",
                level1: "Open a pre-designed Blender asset turntable template. Drop text labels detailing your review topic into the primary workspace layer.",
                level2: "Head to Sketchfab or TurboSquid to pull a free, high-quality 3D model of a robot, mecha, or vintage kit box. Drop it directly into your Blender file scene template.",
                level3: "Model an original low-poly mecha chassis shell manually in Blender. Map customized procedural nodes across shader coordinates to emphasize retro plastic surfaces.",
                beginner: "Workflow Target: Beginner. Navigate the main viewport axis smoothly, organizing your figure meshes cleanly without losing camera alignment parameters.",
                intermediate: "Workflow Target: Intermediate. Animate your camera to slowly zoom directly into the mecha figure's face or visor eye to construct cinematic narrative tension.",
                advanced: "Workflow Target: Advanced. Build a fully custom-lit digital showroom workspace in Cycles, using manual UV unwrapping and localized spot lighting."
            },
            {
                triggers: ['quiet', 'silence', 'elevator', 'isolation', 'agonizing', 'stretches'],
                title: "⏳ Minimalist Structural Timing Graphic",
                level1: "Write a short custom HTML animation using an AI script to generate a simple, clean, minimalist clock layout centering a dark web browser view.",
                level2: "Take your minimalist timer code, open the text editor source, and use specific JavaScript intervals to keep a stark digital ticking layout active on a pitch-black window backdrop.",
                level3: "Engineer an interactive HTML canvas time engine. Script custom frame ticks that slowly distort, export it, and record the viewport to use as a high-concept thematic asset layer.",
                beginner: "Workflow Target: Beginner. Capture the localized .html browser file execution using a clean, uncompressed desktop system screen-recorder layer.",
                intermediate: "Workflow Target: Intermediate. Inject manual CSS animation keyframes directly into the file layout to give the timing text a deliberate, stylized, slow pulse effect.",
                advanced: "Workflow Target: Advanced. Weave external library nodes like GSAP or Three.js inside the logic to manipulate complex vector timing layers manually."
            },
            {
                triggers: ['cityscapes', 'empty cityscapes', 'empty streets', 'ticking clock'],
                title: "🌆 Cinematic Landscape B-Roll",
                level1: "Source high-fidelity, uncompressed 1080p B-roll assets displaying empty city environments, power lines against sunsets, or train lines.",
                level2: "Track down high-bitrate raw anime clips featuring moody, deserted metropolitan streets or rain falling on puddles to isolate into background plates.",
                level3: "Build a massive personal b-roll vault of urban environments. Batch-convert large source containers, catalog them by weather/time, and color grade them to a uniform palette.",
                beginner: "Workflow Target: Beginner. Arrange long, unedited structural landscape shots back-to-back, allowing the scene to breathe on screen without fast cuts.",
                intermediate: "Workflow Target: Intermediate. Layer custom sound design components (like low ambient city drones, rain hums, or wind gusts) under the landscape timeline tracks.",
                advanced: "Workflow Target: Advanced. Combine static b-roll textures using subtle track matte layers and luma masking to create stylized atmospheric haze overlays."
            },
            {
                triggers: ['broken', 'teenager', 'reflection', 'window', 'rain', 'staring'],
                title: "🪞 Moody Mirror Reflection Matte",
                level1: "Isolate a raw scene clip of a character under a low-light setup. Drop it on your primary layout line, slowing the play speed down to 80%.",
                level2: "Apply the 'Mirror' effect inside Premiere Pro, or create a dual-track split screen layer. Use a dark, low-opacity color wash overlay to forge a literal reflection texture on glass.",
                level3: "Construct an advanced composite timeline stack: cross-dissolve a macro shot of rain-slicked glass bokeh elements right over a character profile mask layer.",
                beginner: "Workflow Target: Beginner. Keep the motion stationary. Let the character sit still in frame while using baseline export settings.",
                intermediate: "Workflow Target: Intermediate. Manually adjust structural opacity values and track paths over the glass to perfectly blend the facial lines into the reflection.",
                advanced: "Workflow Target: Advanced. Link to After Effects to use precise track points, anchoring realistic glare layers over the shifting angles of the character's face."
            },
            {
                triggers: ['jazz', 'track', 'music', 'softly', 'melancholic', 'human', 'breathe'],
                title: "💨 Floating Abstract Atmosphere Layout",
                level1: "Prompt your local HTML generator for a simple graphic display containing clean, minimalist dust motes moving slowly across a dark gray backdrop.",
                level2: "Open up the HTML code file manually and update the CSS properties, swapping out the chaotic Matrix text for soft, white abstract particle circles floating gently upward.",
                level3: "Design an intensive custom JavaScript particle node collection via an HTML canvas, managing coordinates to create a slow-moving cloud texture.",
                beginner: "Workflow Target: Beginner. Screen-record the browser viewport window frame cleanly, dropping it right over your music audio sequence tracks.",
                intermediate: "Workflow Target: Intermediate. Manually inject a slow, fading opacity cycle into your canvas CSS script so the particles naturally bloom and dissolve on screen.",
                advanced: "Workflow Target: Advanced. Anchor particle velocity parameters to coordinate directly with external script controllers, crafting an evolving abstract backdrop."
            }
        ];

        window.generateMatrixShots = function() {
            try {
                const scriptInputEl = document.getElementById('scriptInput');
                const outputEl = document.getElementById('outputContainer');
                const scopeSelect = document.getElementById('timeScope');
                const difficultySelect = document.getElementById('difficultyLevel');

                if (!scriptInputEl || !outputEl || !scopeSelect || !difficultySelect) {
                    alert("UI loading issue, please reload.");
                    return;
                }

                const scriptText = scriptInputEl.value.trim();
                const scope = scopeSelect.value;
                const difficulty = difficultySelect.value;

                if (!scriptText) {
                    alert('Please paste your video script first!');
                    return;
                }

                outputEl.innerHTML = "<span class='text-purple-400 animate-pulse'>Re-indexing your editing timeline parameters... ⚙️</span>";

                // Standardize splitting sequences cleanly to isolate logical production blocks
                const sentences = scriptText.split(/[.!?]+/).map(s => s.trim()).filter(s => s.length > 10);
                let processingBlocks = [];

                if (sentences.length <= 1) {
                    processingBlocks.push(scriptText);
                } else {
                    for (let i = 0; i < sentences.length; i += 2) {
                        const block = sentences.slice(i, i + 2).join('. ') + '.';
                        if (block.length > 12) processingBlocks.push(block);
                    }
                }

                let finalBlueprint = [];

                processingBlocks.forEach((block) => {
                    const lowerBlock = block.toLowerCase();
                    let bestThematicMatch = null;
                    let topMatchScore = 0;

                    scriptThematicMap.forEach(item => {
                        let currentScore = 0;
                        item.triggers.forEach(word => {
                            if (lowerBlock.includes(word)) currentScore++;
                        });
                        if (currentScore > topMatchScore) {
                            topMatchScore = currentScore;
                            bestThematicMatch = item;
                        }
                    });

                    let assetTitle = "🎬 General Production Track";
                    let taskBreakdown = "";
                    let stepWarning = "";

                    if (bestThematicMatch && topMatchScore > 0) {
                        assetTitle = bestThematicMatch.title;
                        taskBreakdown = bestThematicMatch[scope];
                        stepWarning = bestThematicMatch[difficulty];
                    } else {
                        // Standardized global fallbacks to protect layout button integrity
                        if (scope === 'level1') {
                            assetTitle = "⏱️ Micro Action Layout";
                            taskBreakdown = "Source fast uncompressed web clips using desktop download hooks. Slice sequences tightly inside your primary timeline track.";
                        } else if (scope === 'level2') {
                            assetTitle = "⏳ Short-Form Workflow Grid";
                            taskBreakdown = "Execute intermediate clip cutting loops, syncing audio sound design hits precisely to physical movement shifts on your preview window frame.";
                        } else {
                            assetTitle = "📆 Macro Timeline Strategy";
                            taskBreakdown = "Orchestrate structural multi-cam nests and fix file frame anomalies before compiling layers inside major production software.";
                        }

                        if (difficulty === 'beginner') {
                            stepWarning = "Workflow Target: Beginner. Keep track operations simple, relying on layout presets and razor cuts.";
                        } else if (difficulty === 'intermediate') {
                            stepWarning = "Workflow Target: Intermediate. Manage positional timeline tracks with custom keyframe paths to build deliberate visual momentum.";
                        } else {
                            stepWarning = "Workflow Target: Advanced. Troubleshoot broken script threads or structural asset tracking issues inside high-end composition nodes.";
                        }
                    }

                    let displayTruncatedLine = block.length > 85 ? block.substring(0, 82) + "..." : block;

                    finalBlueprint.push({
                        title: assetTitle,
                        line: displayTruncatedLine,
                        task: taskBreakdown,
                        warning: stepWarning
                    });
                });

                renderMatrixUI(finalBlueprint);

            } catch (globalError) {
                console.error("System Matrix Exception Handler triggered:", globalError);
                document.getElementById('outputContainer').innerHTML = 
                    `<span class='text-red-400'>Error executing parameters: ${globalError.message}. Please click generate again.</span>`;
            }
        }

        function renderMatrixUI(blueprint) {
            const outputEl = document.getElementById('outputContainer');
            if (!outputEl) return;
            
            outputEl.innerHTML = "";
            
            blueprint.forEach((item, index) => {
                const stepBlock = document.createElement('div');
                stepBlock.className = "mb-6 pb-4 border-b border-gray-800 last:border-0 bg-gray-950 p-4 rounded-xl shadow-inner border border-gray-900";
                stepBlock.innerHTML = `
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-xs font-bold px-2 py-0.5 rounded bg-purple-950 text-purple-300 border border-purple-800">${item.title}</span>
                        <span class="text-gray-500 font-mono text-xs">Asset ${index+1}</span>
                    </div>
                    <p class="text-xs text-gray-500 italic mb-3">Script Beat: "${item.line}"</p>
                    <div class="flex items-start gap-3">
                        <input type="checkbox" class="mt-1 accent-pink-500 w-4 h-4 rounded">
                        <div class="flex-1">
                            <p class="text-gray-200 font-medium text-sm leading-relaxed">${item.task}</p>
                            <p class="text-xs font-mono text-pink-400 mt-2 bg-pink-950/30 p-1.5 px-2.5 rounded border border-pink-900/30">💡 ${item.warning}</p>
                        </div>
                    </div>
                `;
                outputEl.appendChild(stepBlock);
            });
            
            window.currentBlueprint = blueprint;
        }

        window.copyMarkdown = function() {
            if (!window.currentBlueprint) return alert("Nothing to copy yet!");
            let md = "# 🎬 Production Blueprint & Asset Guide\n\n";
            window.currentBlueprint.forEach((item, i) => {
                md += `### Asset ${i+1}: ${item.title}\n`;
                md += `- **Script Focus**: "${item.line}"\n`;
                md += `- [ ] **Task Plan**: ${item.task}\n`;
                md += `- **Technical Requirements**: ${item.warning}\n\n`;
            });
            navigator.clipboard.writeText(md);
            alert("Customized production blueprint markdown copied to clipboard!");
        }
    </script>
</body>
</html>
