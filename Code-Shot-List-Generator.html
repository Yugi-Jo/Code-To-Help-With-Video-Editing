<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Vibe-Code 3-Tier Production Matrix</title>
    <script src="https://cdn.jsdelivr.net/npm/@unocss/runtime/uno.global.js"></script>
    <style>
        body { background-color: #0b0f19; color: #f3f4f6; font-family: sans-serif; }
    </style>
</head>
<body class="p-6 max-w-6xl mx-auto">

    <header class="mb-8 text-center">
        <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500">
            🎬 Vibe-Code: Solo Production Matrix
        </h1>
        <p class="text-gray-400 mt-2">Streamlined Pipeline — Script asset breakdown mapped directly to your deadline windows</p>
    </header>

    <div class="bg-gray-900 border border-gray-800 p-4 rounded-xl mb-6 shadow-lg">
        <label class="block text-xs font-bold text-purple-400 uppercase tracking-wider mb-2">📅 Select Your Project Deadline & Effort Window</label>
        <select id="productionTier" class="w-full bg-gray-950 border border-gray-700 rounded p-3 text-sm text-gray-200 focus:outline-none focus:border-purple-500 font-medium">
            <option value="tier1" selected>🚀 Tier 1: Speed Run (1-2 Days Max) — Handheld shots, rapid templates, fast cuts, crisp clips</option>
            <option value="tier2">⏳ Tier 2: Steady Grind (3-5 Days) — Asset modeling, audio beat syncing, custom CSS tweaks</option>
            <option value="tier3">🏆 Tier 3: Full Week Masterpiece — AE dynamic links, custom node particles, heavy library nesting</option>
        </select>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <div class="flex flex-col">
            <label class="font-semibold text-gray-300 mb-2">📜 Paste Your Script</label>
            <textarea id="scriptInput" rows="12" placeholder="Paste your script here..." 
                      class="w-full h-full bg-gray-900 border border-gray-800 rounded-xl p-4 resize-none focus:outline-none focus:border-pink-500 shadow-inner text-gray-200"></textarea>
            <button id="generateBtn" onclick="generateTieredBlueprint()" 
                    class="mt-4 bg-gradient-to-r from-purple-500 to-pink-500 text-white font-bold py-3 px-6 rounded-xl shadow-md hover:opacity-90 transition duration-200">
                ⚡ Generate Calibrated Blueprint
            </button>
        </div>

        <div class="flex flex-col">
            <div class="flex justify-between items-center mb-2">
                <label class="font-semibold text-gray-300">📋 Actionable Asset Blueprint</label>
                <button onclick="copyMarkdown()" class="text-xs text-purple-400 hover:underline">Copy Markdown</button>
            </div>
            <div id="outputContainer" class="bg-gray-900 border border-gray-800 rounded-xl p-4 h-96 overflow-y-auto shadow-inner text-gray-400 text-sm">
                Your customized pipeline breakdown based on software execution metrics will appear here...
            </div>
        </div>
    </div>

    <script>
        // Production data structure tightly unified into your 3 direct time categories
        const tierMatrixMap = [
            {
                triggers: ['robot', 'mecha', 'monster', 'action', 'explosion', 'flashy', 'sequences'],
                title: "💥 Punchy Action Sequence",
                tier1: "🚀 **Task:** Use `yt-dlp` to grab 1080p source clips cleanly. Drop into Premiere Pro and execute raw timeline slicing using the Razor Tool (C) to cut out dead spaces fast.",
                tier2: "⏳ **Task:** Source high-bitrate unwatermarked gameplay/trailers. Precision-cut and lock frames directly onto heavy transient beats of your music track; add impact frame flashes.",
                tier3: "🏆 **Task:** Build a massive local episode archive. Correct variable frame rate (VFR) audio drift, establish an After Effects dynamic link, and design custom composite screen shakes."
            },
            {
                triggers: ['model kit', 'plastic', 'shelf', 'toy', 'figure', 'kits'],
                title: "🤖 3D Mecha Showcase Asset",
                tier1: "🚀 **Task:** Open an existing Blender turntable project file. Swap background layer colors and viewport focus settings without spending hours modifying layout meshes.",
                tier2: "⏳ **Task:** Download a clean, free mecha or kit box asset from Sketchfab/TurboSquid. Drop it into Blender and animate a slow, cinematic camera tracking zoom straight into the visor eye.",
                tier3: "🏆 **Task:** Model custom low-poly hard surface elements from scratch in Blender. Unwrap UV channels manually, script procedural material node shades, and execute a full Cycles ray-traced render loop."
            },
            {
                triggers: ['quiet', 'silence', 'elevator', 'isolation', 'agonizing', 'stretches'],
                title: "⏳ Minimalist Structural Timing Graphic",
                tier1: "🚀 **Task:** Prompt an AI layout engine for a clean, minimalist web clock script. Save it, view it inside Chrome, and grab the animation instantly using a desktop system screen recorder.",
                tier2: "⏳ **Task:** Open your AI HTML script source. Manually inject CSS animation keyframes to code a slow, moody fading pulse effect onto the central digital ticking timer layout.",
                tier3: "🏆 **Task:** Engineer an advanced interactive HTML canvas time engine. Weave GSAP library script parameters into your code, debug loop threads, and capture a highly stylized retro timing graphic."
            },
            {
                triggers: ['cityscapes', 'empty cityscapes', 'empty streets', 'ticking clock'],
                title: "🌆 Cinematic Landscape B-Roll",
                tier1: "🚀 **Task:** Quickly harvest uncompressed landscape shots (sunsets, power lines, silent buildings). Place long static blocks on the timeline to let the review edit breathe naturally.",
                tier2: "⏳ **Task:** Track down raw anime plates displaying deserted urban zones or rain hitting puddles. Construct ambient audio designs (distant city drones, low wind gusts) beneath the sequence.",
                tier3: "🏆 **Task:** Compile a specialized local B-roll folder vault. Apply custom luma masks, track matte layers, and localized color grading adjustments to unify the environmental atmosphere look perfectly."
            },
            {
                triggers: ['broken', 'teenager', 'reflection', 'window', 'rain', 'staring'],
                title: "🪞 Moody Mirror Reflection Matte",
                tier1: "🚀 **Task:** Pick a low-light character clip track. Isolate a single performance profile block on your layout screen and reduce clip execution speed smoothly down to 80%.",
                tier2: "⏳ **Task:** Apply the 'Mirror' filter in Premiere Pro or build a dual-track split screen layer. Stack a dark, low-opacity color wash over the track to map a realistic reflection glare onto glass.",
                tier3: "🏆 **Task:** Open After Effects. Establish multi-point motion track pins to seamlessly lock a complex rain-slicked glass bokeh overlay plate over the structural angle shifts of the character's face."
            },
            {
                triggers: ['jazz', 'track', 'music', 'softly', 'melancholic', 'human', 'breathe'],
                title: "💨 Floating Abstract Atmosphere Layout",
                tier1: "🚀 **Task:** Ask AI to write a web canvas script featuring small gray circles. Run the .html file locally and screen-capture the motion framework instantly to match the low-key review atmosphere.",
                tier2: "⏳ **Task:** Open the raw canvas HTML properties and swap out chaotic code elements for white abstract particle circles moving slowly upward; adjust alpha channels to let them smoothly dissolve.",
                tier3: "🏆 **Task:** Program a detailed three-dimensional vector particle field script via canvas math modules. Map velocity shifts to coordinate organically with background audio transients for a premium backdrop track."
            }
        ];

        window.generateTieredBlueprint = function() {
            try {
                const scriptInputEl = document.getElementById('scriptInput');
                const outputEl = document.getElementById('outputContainer');
                const tierSelect = document.getElementById('productionTier');

                if (!scriptInputEl || !outputEl || !tierSelect) {
                    alert("System layout sync error, please reload page.");
                    return;
                }

                const scriptText = scriptInputEl.value.trim();
                const currentTier = tierSelect.value;

                if (!scriptText) {
                    alert('Please paste your video script first!');
                    return;
                }

                outputEl.innerHTML = "<span class='text-purple-400 animate-pulse'>Calibrating production metrics for your target deadline... ⚙️</span>";

                // Sentences extraction logic block
                const sentences = scriptText.split(/[.!?]+/).map(s => s.trim()).filter(s => s.length > 10);
                let processingBlocks = [];

                if (sentences.length <= 1) {
                    processingBlocks.push(scriptText);
                } else {
                    for (let i = 0; i < sentences.length; i += 2) {
                        const block = sentences.slice(i, i + 2).join('. ') + '.';
                        if (block.length > 12) processingBlocks.push(block);
                    }
                }

                let finalBlueprint = [];

                processingBlocks.forEach((block) => {
                    const lowerBlock = block.toLowerCase();
                    let matchedData = null;
                    let topScore = 0;

                    tierMatrixMap.forEach(item => {
                        let score = 0;
                        item.triggers.forEach(word => {
                            if (lowerBlock.includes(word)) score++;
                        });
                        if (score > topScore) {
                            topScore = score;
                            matchedData = item;
                        }
                    });

                    let assetTitle = "🎬 General Narrative Segment";
                    let finalInstruction = "";

                    if (matchedData && topScore > 0) {
                        assetTitle = matchedData.title;
                        finalInstruction = matchedData[currentTier];
                    } else {
                        // Fully integrated context fallback architecture matching selected timeline keys
                        if (currentTier === 'tier1') {
                            assetTitle = "🚀 Fast-Track Component";
                            finalInstruction = "🚀 **Task:** Use rapid asset harvesting via online tool streams. Keep transitions clean, relying on baseline scaling choices and simple text layouts to close the task today.";
                        } else if (currentTier === 'tier2') {
                            assetTitle = "⏳ Intermediate Workflow Step";
                            finalInstruction = "⏳ **Task:** Apply position scale tracking keyframes to craft custom visual pacing. Integrate deliberate background audio sound shifts (risers/whooshes) to clean up layout flow.";
                        } else {
                            assetTitle = "🏆 Masterpiece Development Grid";
                            finalInstruction = "🏆 **Task:** Implement complex multi-layered timeline tracking arrangements. Sync heavy nest structures, correct clip anomalies, and verify output encoding profiles to build maximum depth.";
                        }
                    }

                    let displayTruncatedLine = block.length > 85 ? block.substring(0, 82) + "..." : block;

                    finalBlueprint.push({
                        title: assetTitle,
                        line: displayTruncatedLine,
                        task: finalInstruction
                    });
                });

                renderBlueprintUI(finalBlueprint);

            } catch (err) {
                console.error("Critical Matrix runtime intercept:", err);
                document.getElementById('outputContainer').innerHTML = 
                    `<span class='text-red-400'>Error executing tier profiles: ${err.message}. Try hitting generate again.</span>`;
            }
        }

        function renderBlueprintUI(blueprint) {
            const outputEl = document.getElementById('outputContainer');
            if (!outputEl) return;
            
            outputEl.innerHTML = "";
            
            blueprint.forEach((item, index) => {
                const stepBlock = document.createElement('div');
                stepBlock.className = "mb-6 pb-4 border-b border-gray-800 last:border-0 bg-gray-950 p-4 rounded-xl shadow-inner border border-gray-900";
                stepBlock.innerHTML = `
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-xs font-bold px-2 py-0.5 rounded bg-purple-950 text-purple-300 border border-purple-800">${item.title}</span>
                        <span class="text-gray-500 font-mono text-xs">Asset ${index+1}</span>
                    </div>
                    <p class="text-xs text-gray-500 italic mb-3">Script Beat: "${item.line}"</p>
                    <div class="flex items-start gap-3">
                        <input type="checkbox" class="mt-1 accent-pink-500 w-4 h-4 rounded">
                        <p class="text-gray-200 text-sm leading-relaxed flex-1">${item.task}</p>
                    </div>
                `;
                outputEl.appendChild(stepBlock);
            });
            
            window.currentBlueprint = blueprint;
        }

        window.copyMarkdown = function() {
            if (!window.currentBlueprint) return alert("Nothing to copy yet!");
            let md = "# 🎬 Your Customized Solo Production Blueprint\n\n";
            window.currentBlueprint.forEach((item, i) => {
                md += `### Asset ${i+1}: ${item.title}\n`;
                md += `- **Script Beat Focus**: "${item.line}"\n`;
                md += `- [ ] ${item.task}\n\n`;
            });
            navigator.clipboard.writeText(md);
            alert("Customized production blueprint markdown copied to clipboard!");
        }
    </script>
</body>
</html>
