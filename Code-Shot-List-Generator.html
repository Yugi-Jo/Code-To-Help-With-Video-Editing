<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Vibe-Code Workflow Matrix</title>
    <script src="https://cdn.jsdelivr.net/npm/@unocss/runtime/uno.global.js"></script>
    <style>
        body { background-color: #0b0f19; color: #f3f4f6; font-family: sans-serif; }
    </style>
</head>
<body class="p-6 max-w-6xl mx-auto">

    <header class="mb-8 text-center">
        <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500">
            🎬 Vibe-Code: Script to Asset Matrix
        </h1>
        <p class="text-gray-400 mt-2">Production Blueprint calibrated by Time Scope & Technical Learning Curves</p>
    </header>

    <div class="bg-gray-900 border border-gray-800 p-4 rounded-xl mb-6 grid grid-cols-1 md:grid-cols-2 gap-4 shadow-lg">
        <div>
            <label class="block text-xs font-bold text-purple-400 uppercase tracking-wider mb-2">⏱️ Software Time Scope Investment</label>
            <select id="timeScope" class="w-full bg-gray-950 border border-gray-700 rounded p-2 text-sm text-gray-200 focus:outline-none focus:border-purple-500">
                <option value="level1">⏱️ Level 1: Micro (Under 2 Hours - Templates, Web Tools, Basic LUT Cuts)</option>
                <option value="level2" selected>⏳ Level 2: Short-Form (1–2 Days - Custom Assets, Sound Design, Edits)</option>
                <option value="level3">📆 Level 3: Macro (1–3 Weeks - Massive Library Builds, Complex 3D/UI Grinds)</option>
            </select>
        </div>
        <div>
            <label class="block text-xs font-bold text-pink-400 uppercase tracking-wider mb-2">🧠 Technical Difficulty Level</label>
            <select id="difficultyLevel" class="w-full bg-gray-950 border border-gray-700 rounded p-2 text-sm text-gray-200 focus:outline-none focus:border-pink-500">
                <option value="beginner">🟢 Level 1: Beginner (Importing, Viewport basics, Basic AI copies)</option>
                <option value="intermediate" selected>🟡 Level 2: Intermediate (Keyframes, Unwrapping, Tweaking code)</option>
                <option value="advanced">🔴 Level 3: Advanced (VFR Fixes, Geometry Nodes, Three.js loops)</option>
            </select>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <div class="flex flex-col">
            <label class="font-semibold text-gray-300 mb-2">📜 Paste Your Script</label>
            <textarea id="scriptInput" rows="12" placeholder="Paste your script here..." 
                      class="w-full h-full bg-gray-900 border border-gray-800 rounded-xl p-4 resize-none focus:outline-none focus:border-pink-500 shadow-inner text-gray-200"></textarea>
            <button id="generateBtn" onclick="generateMatrixShots()" 
                    class="mt-4 bg-gradient-to-r from-purple-500 to-pink-500 text-white font-bold py-3 px-6 rounded-xl shadow-md hover:opacity-90 transition duration-200">
                ⚡ Generate Calibrated Blueprint
            </button>
        </div>

        <div class="flex flex-col">
            <div class="flex justify-between items-center mb-2">
                <label class="font-semibold text-gray-300">📋 Actionable Asset Blueprint</label>
                <button onclick="copyMarkdown()" class="text-xs text-purple-400 hover:underline">Copy Markdown</button>
            </div>
            <div id="outputContainer" class="bg-gray-900 border border-gray-800 rounded-xl p-4 h-96 overflow-y-auto shadow-inner text-gray-400 text-sm">
                Your customized pipeline breakdown based on software execution metrics will appear here...
            </div>
        </div>
    </div>

    <script>
        // Dictionary matrix configuration
        const scriptThematicMap = [
            {
                triggers: ['robot', 'mecha', 'monster', 'action', 'explosion', 'flashy'],
                title: "💥 Dynamic Action Beat",
                level1: "Quick YouTube rip using online web tools. Slice a 10s viral clip in Premiere Pro, slap a standard action LUT on it, and export.",
                level2: "Sift through full high-quality battle gameplay or trailer streams. Cut a sequence in Premiere Pro with dynamic jump cuts synced tightly to asset audio risers.",
                level3: "Build a massive local archive of raw anime series/movies. Handle MKV-to-MP4 formatting, correct VFR audio drift errors, and index scenes for a multi-track composite sequence.",
                beginner: "Workflow Tier: Beginner. Use raw cuts and baseline timeline presets.",
                intermediate: "Workflow Tier: Intermediate. Utilize manual masking and multitrack keyframes to enhance asset positioning.",
                advanced: "Workflow Tier: Advanced. Execute dynamic linking to After Effects for complex compositing, dealing with offline media or performance optimization crashes."
            },
            {
                triggers: ['model kit', 'plastic', 'shelf', 'toy', 'figure', 'kid', 'childhood'],
                title: "🤖 3D Objects & Toys Collectible Showcase",
                level1: "Open a pre-made Blender asset display scene file template. Swap the baseline text mesh or background tone variables, and render out a basic 5-second rotation file loop.",
                level2: "Model a stylized low-poly figure or model shelf element from scratch in Blender. Map basic procedural material nodes onto the geometry and animate a smooth turntable spinning array.",
                level3: "Construct a complete multi-layered 3D room environment in Blender. Setup complex character rigging pipelines, custom weight painting maps, and simulated particle dust volumes.",
                beginner: "Workflow Tier: Beginner. Move primitive shapes around the workspace without getting lost in the viewport.",
                intermediate: "Workflow Tier: Intermediate. Handle manual UV unwrapping maps, bake textures, and refine camera trajectories using the Graph Editor interface.",
                advanced: "Workflow Tier: Advanced. Deploy complex node systems via Geometry Nodes, coordinate photo-realistic Cycles ray-tracing, and optimize tile memory management."
            },
            {
                triggers: ['quiet', 'silence', 'elevator', 'isolation', 'empty', 'existential', 'cityscapes', 'clock', 'ticking', 'broken', 'teenager', 'reflection', 'window', 'rain', 'melancholic', 'jazz', 'track', 'music', 'softly'],
                title: "⏳ Moody Textures & Abstract Timing Graphic",
                level1: "Prompt an AI tool for a clean matrix background script, save it locally, run it straight inside Chrome, and capture the output using basic screen-recording apps.",
                level2: "Take raw AI-generated HTML engine scripts, open the source file, and manually modify the CSS layouts and JavaScript math structures to patch messy visual bugs into a functional overlay.",
                level3: "Prompt AI engines for a multi-layered complex interactive framework. Stitch heavy HTML canvas arrays together to record an original visual directory of custom glitch interfaces.",
                beginner: "Workflow Tier: Beginner. Drop simple text prompts into AI interfaces, copy raw blocks, and run local .html file previews.",
                intermediate: "Workflow Tier: Intermediate. Ingress custom CSS keyframe animations or direct canvas rendering code to turn janky bugs into deliberate aesthetic expressions.",
                advanced: "Workflow Tier: Advanced. Coax AI scripts into constructing complex framework modules like Three.js or GreenSock (GSAP), debugging deep thread runtime loops manually."
            }
        ];

        window.generateMatrixShots = function() {
            try {
                const scriptInputEl = document.getElementById('scriptInput');
                const outputEl = document.getElementById('outputContainer');
                const scopeSelect = document.getElementById('timeScope');
                const difficultySelect = document.getElementById('difficultyLevel');

                if (!scriptInputEl || !outputEl || !scopeSelect || !difficultySelect) {
                    alert("UI loading error, please refresh page.");
                    return;
                }

                const scriptText = scriptInputEl.value.trim();
                const scope = scopeSelect.value;
                const difficulty = difficultySelect.value;

                if (!scriptText) {
                    alert('Please paste a script first!');
                    return;
                }

                outputEl.innerHTML = "<span class='text-purple-400 animate-pulse'>Re-indexing your editing timeline parameters... ⚙️</span>";

                // Split script cleanly into logic lines
                const sentences = scriptText.split(/[.!?]+/).map(s => s.trim()).filter(s => s.length > 10);
                let processingBlocks = [];

                if (sentences.length <= 1) {
                    processingBlocks.push(scriptText);
                } else {
                    for (let i = 0; i < sentences.length; i += 2) {
                        const block = sentences.slice(i, i + 2).join('. ') + '.';
                        if (block.length > 12) processingBlocks.push(block);
                    }
                }

                let finalBlueprint = [];

                processingBlocks.forEach((block) => {
                    const lowerBlock = block.toLowerCase();
                    let bestThematicMatch = null;
                    let topMatchScore = 0;

                    scriptThematicMap.forEach(item => {
                        let currentScore = 0;
                        item.triggers.forEach(word => {
                            if (lowerBlock.includes(word)) currentScore++;
                        });
                        if (currentScore > topMatchScore) {
                            topMatchScore = currentScore;
                            bestThematicMatch = item;
                        }
                    });

                    let assetTitle = "🎬 General Narrative Segment";
                    let taskBreakdown = "";
                    let stepWarning = "";

                    // Safe fallback assignment loop completely eliminates unhandled dictionary exceptions
                    if (bestThematicMatch && topMatchScore > 0) {
                        assetTitle = bestThematicMatch.title;
                        taskBreakdown = bestThematicMatch[scope] || "Process narrative clip according to project specifications.";
                        stepWarning = bestThematicMatch[difficulty] || "Monitor active production metrics.";
                    } else {
                        // Dynamic algorithmic fallback assignment blocks
                        if (scope === 'level1') {
                            assetTitle = "⏱️ Micro Workflow Sync";
                            taskBreakdown = "Fast clip search using online web tools. Slice a basic 10-30s viral segment in Premiere Pro, use a simple text layout overlay, and apply a standard LUT style layer.";
                        } else if (scope === 'level2') {
                            assetTitle = "⏳ Short-Form Production Sync";
                            taskBreakdown = "Custom sequence building: Extract high-pacing highlights from master logs, build dynamic frame modifications, and deploy structural sound sweeps (whooshes/risers) in Premiere Pro.";
                        } else {
                            assetTitle = "📆 Macro Production Grid";
                            taskBreakdown = "Complex multi-layered canvas setup: Coordinate massive asset imports, construct geometric spatial animations, or compile dynamic web components into isolated graphic files.";
                        }

                        if (difficulty === 'beginner') {
                            stepWarning = "Workflow Tier: Beginner. Rely on default timeline presets, basic shape adjustments, and straightforward import methods.";
                        } else if (difficulty === 'intermediate') {
                            stepWarning = "Workflow Tier: Intermediate. Implement track keyframes for customized position/scale animations, run basic UV texturing, and debug basic source syntax.";
                        } else {
                            stepWarning = "Workflow Tier: Advanced. Coordinate heavy multi-cam nesting lines, configure Geometry Node trees, or interface advanced runtime animations.";
                        }
                    }

                    let displayTruncatedLine = block.length > 85 ? block.substring(0, 82) + "..." : block;

                    finalBlueprint.push({
                        title: assetTitle,
                        line: displayTruncatedLine,
                        task: taskBreakdown,
                        warning: stepWarning
                    });
                });

                renderMatrixUI(finalBlueprint);

            } catch (globalError) {
                console.error("System Matrix Exception Handler triggered:", globalError);
                document.getElementById('outputContainer').innerHTML = 
                    `<span class='text-red-400'>Error executing parameters: ${globalError.message}. Please click generate again.</span>`;
            }
        }

        function renderMatrixUI(blueprint) {
            const outputEl = document.getElementById('outputContainer');
            if (!outputEl) return;
            
            outputEl.innerHTML = "";
            
            blueprint.forEach((item, index) => {
                const stepBlock = document.createElement('div');
                stepBlock.className = "mb-6 pb-4 border-b border-gray-800 last:border-0 bg-gray-950 p-4 rounded-xl shadow-inner border border-gray-900";
                stepBlock.innerHTML = `
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-xs font-bold px-2 py-0.5 rounded bg-purple-950 text-purple-300 border border-purple-800">${item.title}</span>
                        <span class="text-gray-500 font-mono text-xs">Asset ${index+1}</span>
                    </div>
                    <p class="text-xs text-gray-500 italic mb-3">Script Beat: "${item.line}"</p>
                    <div class="flex items-start gap-3">
                        <input type="checkbox" class="mt-1 accent-pink-500 w-4 h-4 rounded">
                        <div class="flex-1">
                            <p class="text-gray-200 font-medium text-sm leading-relaxed">${item.task}</p>
                            <p class="text-xs font-mono text-pink-400 mt-2 bg-pink-950/30 p-1.5 px-2.5 rounded border border-pink-900/30">💡 ${item.warning}</p>
                        </div>
                    </div>
                `;
                outputEl.appendChild(stepBlock);
            });
            
            window.currentBlueprint = blueprint;
        }

        window.copyMarkdown = function() {
            if (!window.currentBlueprint) return alert("Nothing to copy yet!");
            let md = "# 🎬 Production Blueprint & Asset Guide\n\n";
            window.currentBlueprint.forEach((item, i) => {
                md += `### Asset ${i+1}: ${item.title}\n`;
                md += `- **Script Focus**: "${item.line}"\n`;
                md += `- [ ] **Task Plan**: ${item.task}\n`;
                md += `- **Technical Requirements**: ${item.warning}\n\n`;
            });
            navigator.clipboard.writeText(md);
            alert("Customized production blueprint markdown copied to clipboard!");
        }
    </script>
</body>
</html>
