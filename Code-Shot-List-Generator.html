<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Vibe-Code Shot List Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/@unocss/runtime"></script>
    <style>
        body { background-color: #0b0f19; color: #f3f4f6; font-family: sans-serif; }
    </style>
</head>
<body class="p-6 max-w-4xl mx-auto">

    <header class="mb-8 text-center">
        <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500">
            🎬 Vibe-Code: Script to B-Roll
        </h1>
        <p class="text-gray-400 mt-2">Local Smart-Parser Pipeline — 100% Error Proof</p>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <div class="flex flex-col">
            <label class="font-semibold text-gray-300 mb-2">📜 Paste Your Script</label>
            <textarea id="scriptInput" rows="12" placeholder="Paste your script here..." 
                      class="w-full h-full bg-gray-900 border border-gray-800 rounded-xl p-4 resize-none focus:outline-none focus:border-pink-500 shadow-inner text-gray-200"></textarea>
            <button id="generateBtn" onclick="generateShotList()" 
                    class="mt-4 bg-gradient-to-r from-purple-500 to-pink-500 text-white font-bold py-3 px-6 rounded-xl shadow-md hover:opacity-90 transition duration-200">
                ⚡ Generate Shot List
            </button>
        </div>

        <div class="flex flex-col">
            <div class="flex justify-between items-center mb-2">
                <label class="font-semibold text-gray-300">📋 Shot List Checklist</label>
                <button onclick="copyMarkdown()" class="text-xs text-purple-400 hover:underline">Copy Markdown</button>
            </div>
            <div id="outputContainer" class="bg-gray-900 border border-gray-800 rounded-xl p-4 h-96 overflow-y-auto shadow-inner text-gray-400 text-sm">
                Your B-Roll suggestions will appear here...
            </div>
        </div>
    </div>

    <script type="module">
        // Cinematic Shot Director Map
        const library = [
            { keywords: ['robot', 'mecha', 'monster', 'action', 'explosion'], shot: "Dynamic, fast-paced montage of classic high-octane anime combat sequences." },
            { keywords: ['model kit', 'plastic', 'shelf', 'toy', 'figure'], shot: "Macro tracking shot pushing past a neatly organized collection of anime figures on a shelf." },
            { keywords: ['rewatch', 'watched', 'time', 'years ago', 'kid', 'childhood'], shot: "Close-up of a VHS tape loading mechanism or a nostalgic media browser scrolling through titles." },
            { keywords: ['quiet', 'silence', 'elevator', 'isolation', 'empty'], shot: "Cinematic, locked-off wide shot of an empty corridor or symmetrical architectural space highlighting stillness." },
            { keywords: ['cityscapes', 'clock', 'ticking'], shot: "Time-lapse of an urban skyline transitioning from dusk to night, focusing on a massive ticking clock interface overlay." },
            { keywords: ['broken', 'teenager', 'reflection', 'window', 'rain'], shot: "Moody, low-light shot through a rain-slicked window glass with neon city lights reflecting off the droplets." },
            { keywords: ['jazz', 'track', 'music', 'softly', 'background'], shot: "Slow pan across a vintage vinyl record spinning on a turntable under warm, moody studio lighting." },
            { keywords: ['budget', 'pacing', 'breathe', 'masterpiece', 'shows'], shot: "Artistic over-the-shoulder shot of a video creator tweaking color-grading nodes on an editing timeline." }
        ];

        window.generateShotList = function() {
            const scriptText = document.getElementById('scriptInput').value.trim();
            const output = document.getElementById('outputContainer');

            if (!scriptText) {
                alert('Please paste a script first!');
                return;
            }

            output.innerHTML = "<span class='text-purple-400 animate-pulse'>Parsing script aesthetics locally... 🎬</span>";

            setTimeout(() => {
                // Split script into logical analytical sentences
                const sentences = scriptText.split(/[.\n?!\n]+/).map(s => s.trim()).filter(s => s.length > 10);
                let detectedShots = [];

                sentences.forEach(sentence => {
                    const lowerSentence = sentence.toLowerCase();
                    
                    // Match against our cinematic dictionary
                    let matchedShot = library.find(item => 
                        item.keywords.some(keyword => lowerSentence.includes(keyword))
                    );

                    if (matchedShot) {
                        detectedShots.push({
                            line: sentence,
                            shot: matchedShot.shot
                        });
                    }
                });

                // Fallback catchall if text is completely random
                if (detectedShots.length === 0) {
                    detectedShots.push({
                        line: sentences[0] || "Intro Hook",
                        shot: "A-Roll: Clean talking head presentation matching the baseline video topic layout."
                    });
                    detectedShots.push({
                        line: sentences[sentences.length - 1] || "Outro Breakdown",
                        shot: "B-Roll: Slow zoom out showing the desktop editing workspace as the video concludes."
                    });
                }

                renderShots(detectedShots);
            }, 400); // Tiny artificial lag for satisfying UI feedback
        }

        function renderShots(shots) {
            const output = document.getElementById('outputContainer');
            output.innerHTML = "";
            
            shots.forEach((item, index) => {
                const shotDiv = document.createElement('div');
                shotDiv.className = "mb-4 pb-3 border-b border-gray-800 last:border-0";
                shotDiv.innerHTML = `
                    <p class="text-xs text-gray-500 italic mb-1">Focus: "${item.line}"</p>
                    <div class="flex items-start gap-2">
                        <input type="checkbox" class="mt-1 accent-purple-500">
                        <span class="text-gray-200 font-medium"><strong>Shot ${index+1}:</strong> ${item.shot}</span>
                    </div>
                `;
                output.appendChild(shotDiv);
            });
            
            window.currentShots = shots;
        }

        window.copyMarkdown = function() {
            if (!window.currentShots) return alert("Nothing to copy yet!");
            let md = "## 🎬 Shot List\n\n";
            window.currentShots.forEach((item, i) => {
                md += `- [ ] **Shot ${i+1}** (Line: "${item.line}"): ${item.shot}\n`;
            });
            navigator.clipboard.writeText(md);
            alert("Markdown checklist copied to clipboard!");
        }
    </script>
</body>
</html>
