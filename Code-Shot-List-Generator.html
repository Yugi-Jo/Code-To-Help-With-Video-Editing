<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Local AI Vibe-Code Shot List Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/@unocss/runtime"></script>
    <style>
        body { background-color: #0b0f19; color: #f3f4f6; font-family: sans-serif; }
    </style>
</head>
<body class="p-6 max-w-4xl mx-auto">

    <header class="mb-8 text-center">
        <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500">
            🎬 Vibe-Code: Script to B-Roll
        </h1>
        <p class="text-gray-400 mt-2">Pure Local AI Engine — Zero Server Connections, Zero Fetch Errors</p>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <div class="flex flex-col">
            <label class="font-semibold text-gray-300 mb-2">📜 Paste Your Script</label>
            <textarea id="scriptInput" rows="12" placeholder="Paste your script here..." 
                      class="w-full h-full bg-gray-900 border border-gray-800 rounded-xl p-4 resize-none focus:outline-none focus:border-pink-500 shadow-inner text-gray-200"></textarea>
            <button id="generateBtn" onclick="generateLocalAIShotList()" 
                    class="mt-4 bg-gradient-to-r from-purple-500 to-pink-500 text-white font-bold py-3 px-6 rounded-xl shadow-md hover:opacity-90 transition duration-200">
                ⚡ Generate Shot List
            </button>
        </div>

        <div class="flex flex-col">
            <div class="flex justify-between items-center mb-2">
                <label class="font-semibold text-gray-300">📋 Shot List Checklist</label>
                <button onclick="copyMarkdown()" class="text-xs text-purple-400 hover:underline">Copy Markdown</button>
            </div>
            <div id="outputContainer" class="bg-gray-900 border border-gray-800 rounded-xl p-4 h-96 overflow-y-auto shadow-inner text-gray-400 text-sm">
                Your B-Roll suggestions will appear here...
            </div>
        </div>
    </div>

    <script type="module">
        // Import the web-native local AI pipeline execution kit
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

        let localAiModel = null;

        window.generateLocalAIShotList = async function() {
            const scriptText = document.getElementById('scriptInput').value.trim();
            const output = document.getElementById('outputContainer');

            if (!scriptText) {
                alert('Please paste a script first!');
                return;
            }

            output.innerHTML = "<span class='text-purple-400 animate-pulse'>Warming up the local AI engine... (First run downloads the 400MB model directly into your browser cache, please wait a moment!) 🧠</span>";

            try {
                // Instantiating a smart text-generation framework directly inside the client workspace
                if (!localAiModel) {
                    localAiModel = await pipeline('text2text-generation', 'Xenova/LaMini-Flan-T5-783M');
                }

                output.innerHTML = "<span class='text-pink-400 animate-pulse'>Local AI is reading your script metaphors... 🎬</span>";

                // Break script down by paragraphs for broad structural analysis
                const paragraphs = scriptText.split('\n\n').filter(p => p.trim().length > 10);
                let compiledShots = [];

                for (let block of paragraphs) {
                    block = block.trim();
                    
                    // We prompt the local network to output a clean B-roll layout concept
                    const instructionPrompt = `Task: You are a creative movie director. Read this video script line: "${block}". Describe a visually interesting, detailed B-roll footage shot description that matches this exact scene vibe. Output only the camera shot description.`;
                    
                    const response = await localAiModel(instructionPrompt, {
                        max_new_tokens: 60,
                        temperature: 0.6,
                    });

                    let aiShotResult = response[0].generated_text;
                    
                    // Clean up any weird repeating text prefixes the model might output
                    aiShotResult = aiShotResult.replace(/^Shot description:|^B-roll:|^Visual:/i, '').trim();

                    compiledShots.push({
                        line: block.substring(0, 75) + "...",
                        shot: aiShotResult || "A-Roll close up highlighting the dialog progression."
                    });
                }

                renderShots(compiledShots);

            } catch (error) {
                console.error(error);
                output.innerHTML = `
                    <span class='text-red-400 font-semibold'>Local Execution Error:</span><br>
                    <span class='text-gray-400 block mt-2 text-xs bg-black p-2 rounded border border-gray-800 font-mono'>${error.message}</span>
                `;
            }
        }

        function renderShots(shots) {
            const output = document.getElementById('outputContainer');
            output.innerHTML = "";
            
            shots.forEach((item, index) => {
                const shotDiv = document.createElement('div');
                shotDiv.className = "mb-4 pb-3 border-b border-gray-800 last:border-0";
                shotDiv.innerHTML = `
                    <p class="text-xs text-gray-500 italic mb-1">Focus Context: "${item.line}"</p>
                    <div class="flex items-start gap-2">
                        <input type="checkbox" class="mt-1 accent-purple-500">
                        <span class="text-gray-200 font-medium"><strong>Shot ${index+1}:</strong> ${item.shot}</span>
                    </div>
                `;
                output.appendChild(shotDiv);
            });
            
            window.currentShots = shots;
        }

        window.copyMarkdown = function() {
            if (!window.currentShots) return alert("Nothing to copy yet!");
            let md = "## 🎬 Shot List\n\n";
            window.currentShots.forEach((item, i) => {
                md += `- [ ] **Shot ${i+1}** (Line: "${item.line}"): ${item.shot}\n`;
            });
            navigator.clipboard.writeText(md);
            alert("Markdown checklist copied to clipboard!");
        }
    </script>
</body>
</html>
