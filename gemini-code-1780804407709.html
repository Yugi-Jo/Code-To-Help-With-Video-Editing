<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Vibe-Code Shot List Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/@unocss/runtime"></script>
    <style>
        body { background-color: #0b0f19; color: #f3f4f6; font-family: sans-serif; }
    </style>
</head>
<body class="p-6 max-w-4xl mx-auto">

    <header class="mb-8 text-center">
        <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500">
            🎬 Vibe-Code: Script to B-Roll
        </h1>
        <p class="text-gray-400 mt-2">Paste your video script and let AI map out your visual shot list.</p>
    </header>

    <div class="bg-gray-900 border border-gray-800 p-4 rounded-xl mb-6 shadow-lg">
        <label class="block text-sm font-semibold text-gray-300 mb-2">Google Gemini API Key:</label>
        <input type="password" id="apiKey" placeholder="AIzaSy..." 
               class="w-full bg-gray-950 border border-gray-700 rounded p-2 text-sm focus:outline-none focus:border-purple-500">
        <p class="text-xs text-gray-500 mt-1">Stored locally in your browser. Get one at Google AI Studio.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <div class="flex flex-col">
            <label class="font-semibold text-gray-300 mb-2">📜 Paste Your Script</label>
            <textarea id="scriptInput" rows="12" placeholder="Look, modern video editing is exhausting. You sit down, you have a killer idea, but then you spend three hours looking for stock footage..." 
                      class="w-full h-full bg-gray-900 border border-gray-800 rounded-xl p-4 resize-none focus:outline-none focus:border-pink-500 shadow-inner"></textarea>
            <button id="generateBtn" onclick="generateShotList()" 
                    class="mt-4 bg-gradient-to-r from-purple-500 to-pink-500 text-white font-bold py-3 px-6 rounded-xl shadow-md hover:opacity-90 transition duration-200">
                ⚡ Generate Shot List
            </button>
        </div>

        <div class="flex flex-col">
            <div class="flex justify-between items-center mb-2">
                <label class="font-semibold text-gray-300">📋 Shot List Checklist</label>
                <button onclick="copyMarkdown()" class="text-xs text-purple-400 hover:underline">Copy Markdown</button>
            </div>
            <div id="outputContainer" class="bg-gray-900 border border-gray-800 rounded-xl p-4 h-96 overflow-y-auto shadow-inner text-gray-400 text-sm">
                Your B-Roll suggestions will appear here...
            </div>
        </div>
    </div>

    <script type="module">
        // Auto-load saved API key if it exists
        document.getElementById('apiKey').value = localStorage.getItem('gemini_api_key') || '';

        window.generateShotList = async function() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const scriptText = document.getElementById('scriptInput').value.trim();
            const output = document.getElementById('outputContainer');

            if (!apiKey || !scriptText) {
                alert('Please provide both an API key and a script!');
                return;
            }

            // Save key for next time
            localStorage.setItem('gemini_api_key', apiKey);
            output.innerHTML = "<span class='text-purple-400 animate-pulse'>AI is cooking up your shots... 🍳</span>";

            const prompt = `You are an expert video director. Analyze this video script and extract a detailed B-roll shot list. 
            Identify moments where visual B-roll helps pacing or explains concepts. 
            Return the output strictly as a valid JSON array of objects. Each object must have exactly two fields: "line" (the script text) and "shot" (the visual description). Do not warp the output in markdown code fences (\`\`\`), just give raw JSON text.

            Script: "${scriptText}"`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                let rawText = data.candidates[0].content.parts[0].text.trim();
                
                // Backup cleaner in case Gemini adds markdown fences anyway
                if (rawText.startsWith("```json")) rawText = rawText.replace(/```json|```/g, "").trim();

                const shots = JSON.parse(rawText);
                renderShots(shots);

            } catch (error) {
                console.error(error);
                output.innerHTML = "<span class='text-red-400'>Error generating shot list. Make sure your API key is valid and check the console.</span>";
            }
        }

        function renderShots(shots) {
            const output = document.getElementById('outputContainer');
            output.innerHTML = "";
            
            shots.forEach((item, index) => {
                const shotDiv = document.createElement('div');
                shotDiv.className = "mb-4 pb-3 border-b border-gray-800 last:border-0";
                shotDiv.innerHTML = `
                    <p class="text-xs text-gray-500 italic mb-1">Focus: "${item.line}"</p>
                    <div class="flex items-start gap-2">
                        <input type="checkbox" class="mt-1 accent-purple-500">
                        <span class="text-gray-200 font-medium"><strong>Shot ${index+1}:</strong> ${item.shot}</span>
                    </div>
                `;
                output.appendChild(shotDiv);
            });
            
            // Store raw data globally on window for the copy markdown function
            window.currentShots = shots;
        }

        window.copyMarkdown = function() {
            if (!window.currentShots) return alert("Nothing to copy yet!");
            let md = "## 🎬 Shot List\n\n";
            window.currentShots.forEach((item, i) => {
                md += `- [ ] **Shot ${i+1}** (Line: "${item.line}"): ${item.shot}\n`;
            });
            navigator.clipboard.writeText(md);
            alert("Markdown checklist copied to clipboard!");
        }
    </script>
</body>
</html>
